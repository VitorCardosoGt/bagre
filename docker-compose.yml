name: bagre    # pino o nome do projeto pra preservar volumes após mover a pasta
services:
  db:
    image: postgres:16-alpine
    container_name: bagre-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bagre
      POSTGRES_PASSWORD: bagre
      POSTGRES_DB: bagre
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bagre -d bagre"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    container_name: bagre-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bagre:bagre@db:5432/bagre?schema=public
      PORT: 3001
      NODE_ENV: production
      # Tokens / segredos — sem defaults inseguros. Defina no .env.
      # JWT_SECRET é obrigatório (API recusa boot sem ele, ≥32 chars).
      # BOOTSTRAP_ADMIN_PASSWORD: opcional; se omitido, gerada aleatoriamente
      # e impressa no log do api container no primeiro boot.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@bagre.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      STATS_PUBLIC: ${STATS_PUBLIC:-false}
      CLOUD_CREDS_KEY: ${CLOUD_CREDS_KEY:-}
      # Optional base AWS credentials used by ASSUME_ROLE auth mode on
      # cloud-accounts. Leave empty unless you'll connect AWS via Assume Role.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data:ro

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: /api
    container_name: bagre-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  db_data:
