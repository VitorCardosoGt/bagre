# Overlay de PRODUÇÃO na VPS (co-locado com outros serviços), focado em segurança.
#
# A demo NÃO abre nenhuma porta no host: usa Cloudflare Tunnel (cloudflared),
# que faz uma conexão de SAÍDA para o Cloudflare. O Cloudflare (laranja) entrega
# demo.bagre.dev com TLS/DDoS/WAF e encaminha pelo túnel até o nginx interno da
# demo. Resultado: zero conflito de porta, zero exposição, nada do host é tocado.
#
# Uso (na VPS):
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.zabbix-dev.yml \
#     -f docker-compose.demo.yml \
#     -f docker-compose.demo.vps.yml \
#     up -d
#
# Requer: Docker Compose v2.24+ (tags !override / !reset) e a env TUNNEL_TOKEN
# (criada no Cloudflare Zero Trust → Networks → Tunnels). Ver infra/demo/cloudflare-setup.md.

services:
  # Túnel de saída para o Cloudflare — não publica nada no host.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bagre-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - demo-nginx
    mem_limit: 64m
    security_opt:
      - no-new-privileges:true

  # nginx interno da demo — camada de rate-limit + headers. HTTP simples (o TLS
  # é do Cloudflare/túnel). Não publica porta: só o cloudflared o alcança.
  demo-nginx:
    image: nginx:alpine
    container_name: bagre-demo-nginx
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - ./infra/demo/nginx-demo.bagre.dev.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 64m
    security_opt:
      - no-new-privileges:true

  # App web (SPA + proxy interno de /api) — interno, sem porta no host.
  web:
    ports: !reset null
    security_opt:
      - no-new-privileges:true

  # API interna — o nginx do `web` já proxia /api e /metrics para api:3001.
  api:
    ports: !reset null
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Postgres NUNCA público — o base publica 5433; aqui removemos.
  db:
    ports: !reset null
    security_opt:
      - no-new-privileges:true

  # Zabbix 100% interno — nunca publicado.
  zabbix-web:
    ports: !reset null
    security_opt:
      - no-new-privileges:true
  zabbix-server:
    ports: !reset null
    security_opt:
      - no-new-privileges:true
  zabbix-db:
    security_opt:
      - no-new-privileges:true
