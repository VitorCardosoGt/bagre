# DokuWiki local pra documentação do projeto.
# Roda isolado — NÃO conflita com o stack principal (bagre) nem é deployado em SP3.
# Subir:  docker compose -f docker-compose.wiki.yml up -d
# Acessar: http://localhost:8090
# Primeiro uso: vai em http://localhost:8090/install.php pra criar o admin.
# Parar:  docker compose -f docker-compose.wiki.yml down
# Limpar dados:  docker compose -f docker-compose.wiki.yml down -v
name: bagre-wiki
services:
  dokuwiki:
    image: lscr.io/linuxserver/dokuwiki:latest
    container_name: bagre-wiki
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
    ports:
      - "8090:80"
    volumes:
      - wiki_data:/config

volumes:
  wiki_data:
