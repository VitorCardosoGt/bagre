# vhost do demo.bagre.dev — roda DENTRO do stack (serviço demo-nginx), na :8443.
# Montado como /etc/nginx/conf.d/default.conf (incluído no http{} do nginx base).
#
# O Cloudflare (laranja, Full strict) conecta na origem em 187.x.x.x:8443 (via
# Origin Rule de reescrita de porta). Este nginx faz TLS de origem (Cloudflare
# Origin Cert), rate-limit e headers, e proxia para o container `web` interno.
#
# Pré-requisitos no host (ver infra/demo/cloudflare-setup.md):
#   /etc/ssl/bagre-demo/origin.pem  e  /etc/ssl/bagre-demo/origin.key

# ---- Rate limit / limite de conexões (por IP do visitante) ----
limit_req_zone  $binary_remote_addr  zone=demo_login:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=demo_api:10m    rate=20r/s;
limit_conn_zone $binary_remote_addr  zone=demo_conn:10m;

# ---- IP real do visitante via Cloudflare (logs + rate-limit corretos) ----
# O peer imediato é o edge do Cloudflare — confiamos nas faixas públicas dele.
# Atualize a lista em https://www.cloudflare.com/ips/ quando necessário.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

upstream demo_web {
    server web:80;
}

server {
    listen 8443 ssl;
    http2 on;
    server_name demo.bagre.dev;

    # TLS de origem — Cloudflare Origin Certificate (grátis, 15 anos). CF: Full (strict).
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Opcional (forte): recusa quem não vem do Cloudflare (acesso direto ao IP:8443).
    # Descomente para travar:
    #   if ($http_cf_connecting_ip = "") { return 403; }

    server_tokens off;
    client_max_body_size 12m;     # imports CSV/XLSX/JSON; ajuste se precisar
    client_body_timeout 15s;
    send_timeout 15s;
    keepalive_timeout 30s;

    # Cabeçalhos de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "0" always;

    # Headers de proxy (válidos para todos os locations abaixo)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_read_timeout 30s;

    limit_conn demo_conn 20;

    # Login: rate-limit apertado (reforça o do app)
    location = /api/auth/login {
        limit_req zone=demo_login burst=5 nodelay;
        proxy_pass http://demo_web;
    }

    # Demais rotas da API
    location /api/ {
        limit_req zone=demo_api burst=40 nodelay;
        proxy_pass http://demo_web;
    }

    # SPA + estáticos
    location / {
        proxy_pass http://demo_web;
    }
}
