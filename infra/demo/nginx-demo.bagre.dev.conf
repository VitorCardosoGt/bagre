# vhost do demo.bagre.dev — proxy reverso + camada de segurança.
#
# Instalar na VPS (junto das demais configs do nginx, sem conflitar):
#   sudo cp infra/demo/nginx-demo.bagre.dev.conf /etc/nginx/conf.d/demo.bagre.dev.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Pré-requisitos:
#   - container web escutando em 127.0.0.1:8088 (docker-compose.demo.vps.yml)
#   - Cloudflare Origin Certificate em /etc/nginx/ssl/demo.bagre.dev/
#     (ver infra/demo/cloudflare-setup.md)
#
# Diretivas de zona ficam no contexto http (este arquivo é incluído nele).

# ---- Rate limit / limite de conexões (por IP do visitante) ----
limit_req_zone  $binary_remote_addr  zone=demo_login:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=demo_api:10m    rate=20r/s;
limit_conn_zone $binary_remote_addr  zone=demo_conn:10m;

# ---- IP real do visitante via Cloudflare (logs + rate-limit corretos) ----
# Atualize a lista em https://www.cloudflare.com/ips/ quando necessário.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name demo.bagre.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demo.bagre.dev;

    # TLS — Cloudflare Origin Certificate (grátis, 15 anos). Modo CF: Full (strict).
    ssl_certificate     /etc/nginx/ssl/demo.bagre.dev/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/demo.bagre.dev/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Opcional (forte): só o Cloudflare alcança a origem. Alternativa mais
    # robusta = Authenticated Origin Pulls (mTLS) — ver cloudflare-setup.md.
    # Descomente para travar acesso direto pelo IP da VPS:
    #   if ($http_cf_connecting_ip = "") { return 403; }

    server_tokens off;
    client_max_body_size 12m;     # imports CSV/XLSX/JSON; ajuste se precisar
    client_body_timeout 15s;
    send_timeout 15s;
    keepalive_timeout 30s;

    # Cabeçalhos de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "0" always;

    # Headers de proxy (válidos para todos os locations abaixo)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 30s;

    # Limite de conexões simultâneas por IP
    limit_conn demo_conn 20;

    # Login: rate-limit apertado (reforça o do app)
    location = /api/auth/login {
        limit_req zone=demo_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8088;
    }

    # Demais rotas da API
    location /api/ {
        limit_req zone=demo_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8088;
    }

    # SPA + estáticos
    location / {
        proxy_pass http://127.0.0.1:8088;
    }
}
