# vhost interno da demo — roda DENTRO do stack (serviço demo-nginx), na :80 HTTP.
# Montado como /etc/nginx/conf.d/default.conf. NÃO é exposto no host: só o
# cloudflared (Cloudflare Tunnel) o alcança pela rede do projeto.
#
# Fluxo: visitante → Cloudflare (TLS/WAF) → cloudflared → demo-nginx → web.
# Camada local: rate-limit + headers + IP real do visitante (Cf-Connecting-Ip).

# ---- Rate limit / limite de conexões (por IP do visitante) ----
limit_req_zone  $binary_remote_addr  zone=demo_login:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=demo_api:10m    rate=20r/s;
limit_conn_zone $binary_remote_addr  zone=demo_conn:10m;

# ---- IP real do visitante ----
# Atrás do túnel, o cloudflared (na rede Docker privada) injeta Cf-Connecting-Ip.
# Confiamos nas faixas privadas internas e lemos o IP real desse header.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header Cf-Connecting-Ip;

upstream demo_web {
    server web:80;
}

server {
    listen 80 default_server;
    server_name demo.bagre.dev _;

    server_tokens off;
    client_max_body_size 12m;     # imports CSV/XLSX/JSON; ajuste se precisar
    client_body_timeout 15s;
    send_timeout 15s;
    keepalive_timeout 30s;

    # Cabeçalhos de segurança (a página é servida via HTTPS no edge do Cloudflare)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "0" always;

    # Headers de proxy (válidos para todos os locations abaixo)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_read_timeout 30s;

    limit_conn demo_conn 20;

    # Login: rate-limit apertado (reforça o do app)
    location = /api/auth/login {
        limit_req zone=demo_login burst=5 nodelay;
        proxy_pass http://demo_web;
    }

    # Demais rotas da API
    location /api/ {
        limit_req zone=demo_api burst=40 nodelay;
        proxy_pass http://demo_web;
    }

    # SPA + estáticos
    location / {
        proxy_pass http://demo_web;
    }
}
