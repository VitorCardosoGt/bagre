# PowerDNS do ambiente de DEMO — backend sqlite, API HTTP habilitada.
# Servidor autoritativo INTERNO (não afeta o DNS real, que está no Cloudflare).
launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite3

api=yes
api-key=bagre-demo-key
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0

disable-syslog=yes
log-timestamp=no
loglevel=3
