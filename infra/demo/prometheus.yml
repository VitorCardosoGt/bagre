# Prometheus do ambiente de DEMO. Faz scrape de 3 node-exporters em IPs
# estáticos (10.140.0.x) — viram targets "up" e o Bagre descobre cada um
# como host (Servidor Linux) via a integração Prometheus.
global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets:
          - 10.140.0.10:9100
          - 10.140.0.11:9100
          - 10.140.0.12:9100
