sterWidgets } from './routes/widgets.js';\n// ...\nawait registerWidgets(app);\n```\n\n3. Reinicie a API. O hook global `onRequest` cuida de auth + RBAC automaticamente.\n\n---\n\n## Adicionar uma nova pأ،gina (frontend)\n\n1. Crie `apps/web/src/pages/Widgets.jsx`:\n\n```jsx\nimport { useQuery } from '@tanstack/react-query';\nimport { api } from '../api.js';\nimport PageHeader from '../components/PageHeader.jsx';\n\nexport default function Widgets() {\n  const { data, isLoading } = useQuery({\n    queryKey: ['widgets'],\n    queryFn: api.widgets,\n  });\n  return (\n    <div>\n      <PageHeader title=\"Widgets\" description=\"...\" />\n      {isLoading ? <p>Carregandoâ€¦</p> : <pre>{JSON.stringify(data, null, 2)}</pre>}\n    </div>\n  );\n}\n```\n\n2. Adicione no cliente API (`apps/web/src/api.js`):\n\n```js\nwidgets: () => request('/widgets'),\n```\n\n3. Adicione a rota em `App.jsx`:\n\n```jsx\nimport Widgets from './pages/Widgets.jsx';\n// ...\n<Route path=\"/widgets\" element={<Widgets />} />\n```\n\n4. Adicione na sidebar em `components/Layout.jsx` (se for navegأ،vel).\n\n---\n\n## Schema Prisma\n\nEditar `apps/api/prisma/schema.prisma`. Apأ³s mudanأ§as:\n\n```bash\n# Em dev (drop-and-recreate via db push)\ndocker compose exec api npx prisma db push\n\n# Em produأ§أ£o (cria migration versionada)\ndocker compose exec api npx prisma migrate dev --name nome-da-mudanca\n```\n\nRegenerar o cliente Prisma (necessأ،rio apأ³s mudar o schema):\n\n```bash\ndocker compose exec api npx prisma generate\n```\n\n---\n\n## Convenأ§أµes de cأ³digo\n\n### Geral\n- Idioma: **portuguأھs brasileiro** em mensagens de UI, comentأ،rios, descriأ§أµes. **Inglأھs** em nomes de variأ،veis/funأ§أµes/arquivos.\n- Indentaأ§أ£o: 2 espaأ§os\n- Aspas: simples no JS, duplas no JSX\n- Imports: ordem padrأ£o (built-in â†’ externos â†’ internos)\n\n### Backend\n- **Async/await** sempre, sem callbacks\n- Erros lanأ§ados com `Error` padrأ£o; Fastify retorna 500\n- Para erros esperados, set `err.statusCode` e jogue\n- Audit em **todo** mutador (CRUD)\n\n### Frontend\n- Componentes funcionais, hooks\n- TanStack Query para todo dado de servidor (nأ£o use useState direto)\n- Toast para feedback de aأ§أ£o (use `useToast()`)\n- Confirmaأ§أ£o destrutiva via `ConfirmDialog`\n- Estilo via Tailwind classes; componentes reutilizأ،veis em `components/`\n\n---\n\n## Build de produأ§أ£o\n\n### API\n```bash\ncd apps/api\ndocker build -t bagre-api:prod .\n```\n\nA imagem tem ~250 MB. Inclui Node 20, OpenSSL, deps de produأ§أ£o, schema Prisma compilado.\n\n### Web\n```bash\ncd apps/web\ndocker build -t bagre-web:prod --build-arg VITE_API_URL=/api .\n```\n\nMulti-stage:\n1. Build via Vite (output em `dist/`)\n2. Serve via nginx Alpine\n\nA imagem tem ~50 MB.\n\n---\n\n## Scripts أ؛teis\n\n### Extraأ§أ£o da planilha\n```bash\npython3 scripts/extract_xlsx.py\n# Lأھ data/Controle de IP - LAN.xlsx\n# Gera scripts/seed.json\n```\n\n### Atualizar dashboard de metas\n```bash\nnode scripts/update-metas.mjs\nnode scripts/update-metas.mjs --watch    # regenera em qualquer mudanأ§a\n```\n\n### Popular Zabbix dev\n```bash\nnode scripts/seed-zabbix-dev.mjs\n```\n\n### Gravar vأ­deo demo\n```bash\nnode scripts/record-demo.mjs\n# Gera demos/integration-demo.mp4 via Playwright + ffmpeg\n```\n\n---\n\n## Ferramentas recomendadas\n\n| Para | Ferramenta |\n|---|---|\n| Editor | VS Code com Prisma extension, Tailwind IntelliSense, ESLint |\n| API testing | Insomnia / Postman / `curl` com `xh` |\n| DB GUI | TablePlus / DBeaver / `pgcli` |\n| Logs | `lazydocker` |\n| Capturar UI | Playwright (incluso no projeto) |\n\n---\n\n## Como contribuir\n\n1. Crie um branch a partir de `main`: `git checkout -b feat/minha-feature`\n2. Implemente + adicione testes (quando houver suite)\n3. Verifique manualmente: `docker compose up -d --build`\n4. Documente: atualize o doc relevante em `docs/`\n5. Commit com mensagem descritiva (em pt-BR ou en, consistente com o repo)\n6. Abra PR / submit ao processo interno\n\n### Checklist antes de pedir review\n\n- [ ] `docker compose up --build` funciona do zero\n- [ ] Login funciona, navegaأ§أ£o bأ،sica OK\n- [ ] Auditoria registra a operaأ§أ£o nova (se for CRUD)\n- [ ] Permissأµes funcionam (READER bloqueado em escritas)\n- [ ] Documentaأ§أ£o atualizada\n- [ ] Sem secrets hardcoded\n- [ ] Sem `console.log` esquecido\n\n---\n\n## Roadmap tأ©cnico (sugestأµes)\n\nEm ordem de impacto:\n\n1. **Tags** em sites/subnets/IPs â€” habilita FinOps e Tele\\*\n2. **Sync Azure Resource Manager** â€” espelha vNets/NSGs/FrontDoor\n3. **Webhooks de saأ­da** â€” para Teams/Slack/n8n\n4. **Tokens API por integraأ§أ£o** (substituir o `INGEST_TOKEN` global)\n5. **2FA TOTP** para contas locais\n6. **OTEL traces** instrumentando Fastify+Prisma\n7. **IPv6**\n8. **Workflow de aprovaأ§أ£o** para alocaأ§أ£o de IPs (pra times grandes)\n9. **Dashboard Grafana prأ©-pronto** num container ao lado\n10. **Backup automatizado** com retenأ§أ£o e upload pra cloud\n\nCada item tem detalhes em `METAS.md` e contexto de prioridade no dashboard `metas.html`.\n"}];

const docMap = Object.fromEntries(DOCS.map(d => [d.id, d]));

function render(id) {
  const doc = docMap[id];
  if (!doc) return;
  // Marca ativo na sidebar
  document.querySelectorAll('aside nav a').forEach(a => a.classList.toggle('active', a.dataset.id === id));
  // Renderiza markdown
  const html = marked.parse(doc.content);
  document.getElementById('content').innerHTML = html;
  // Highlight code
  if (window.Prism && Prism.highlightAll) Prism.highlightAll();
  // Sobe pro topo
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Atualiza hash
  history.replaceState(null, '', '#' + id);
  // Build TOC
  buildToc();
  // Atualiza tأ­tulo
  document.title = doc.title ? doc.title + ' آ· Bagre' : 'Documentaأ§أ£o آ· Bagre';
}

function buildToc() {
  const toc = document.getElementById('toc');
  const headings = document.querySelectorAll('.content h2, .content h3');
  if (!headings.length) { toc.innerHTML = ''; return; }
  let html = '<h4>Nesta pأ،gina</h4>';
  headings.forEach(h => {
    const id = h.id || h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    h.id = id;
    const tag = h.tagName.toLowerCase();
    html += '<a href="#' + id + '" class="' + (tag === 'h3' ? 'h3' : '') + '">' + h.textContent + '</a>';
  });
  toc.innerHTML = html;

  // Scroll spy
  const links = toc.querySelectorAll('a');
  const obs = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + e.target.id));
      }
    }
  }, { rootMargin: '-20% 0px -70% 0px' });
  headings.forEach(h => obs.observe(h));
}

function filterNav(term) {
  const t = (term || '').toLowerCase().trim();
  const links = document.querySelectorAll('aside nav a');
  links.forEach(link => {
    const id = link.dataset.id;
    const doc = docMap[id];
    if (!t) {
      link.style.display = '';
      link.querySelector('.num').textContent = '';
      return;
    }
    const inTitle = doc.title.toLowerCase().includes(t);
    const matches = (doc.content.toLowerCase().match(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
    link.style.display = (inTitle || matches > 0) ? '' : 'none';
    link.querySelector('.num').textContent = matches > 0 && !inTitle ? 'آ· ' + matches : '';
  });
}
