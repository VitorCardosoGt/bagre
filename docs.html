d com utilizaأ§أ£o global e por site\n- Calculadora CIDR integrada\n- Busca global âŒکK (IP, hostname, subnet, funأ§أ£o)\n\n### Seguranأ§a e governanأ§a\n- Perfis ADMIN / READER (RBAC)\n- Auditoria com diff antes/depois para qualquer alteraأ§أ£o\n- SSO via Microsoft Entra ID (OIDC) configurأ،vel pela UI\n- Login local sempre disponأ­vel como fallback\n\n### Integraأ§أµes\n- **Zabbix** (sync periأ³dico): enriquece IPs com tipo, OS, MAC, vendor\n- **API de ingestأ£o** para scanners externos (nmap, OTEL collectors)\n- **Mأ©tricas Prometheus** em `/metrics`\n- **Reimportaأ§أ£o** da planilha original sob demanda\n\n### Saأ؛de da rede\n- IPs stale (marcados como em uso mas sem responder hأ، > N dias)\n- IPs fantasmas (vivos na rede mas nأ£o cadastrados)\n- Conflitos detectados\n\n---\n\n## âڑ، Quick start\n\nA partir do diretأ³rio raiz do projeto:\n\n```bash\ncp .env.example .env\ndocker compose up -d --build\n```\n\nAguarde ~30 segundos e abra http://localhost:3000.\n\nLogin: `admin@bagre.local` / `admin123`\n\nPrأ³ximo passo recomendado: leia a [Instalaأ§أ£o](./02-instalacao.md) para detalhes\nde configuraأ§أ£o e ambiente.\n\n---\n\n## ًں›  Stack\n\n| Camada | Tecnologia | Por quأھ |\n|---|---|---|\n| Frontend | React 18 + Vite + TailwindCSS | Bundle leve, HMR rأ،pido, design clean |\n| Estado | TanStack Query (React Query) | Cache automأ،tico, sincronizaأ§أ£o com servidor |\n| Backend | Node.js 20 + Fastify | 2-3أ— mais rأ،pido que Express, validaأ§أ£o nativa |\n| ORM | Prisma | Schema declarativo, migrations versionadas, type-safety |\n| Banco | PostgreSQL 16 | Maturidade, JSON nativo, أ­ndices avanأ§ados |\n| Auth | JWT (`@fastify/jwt`) + bcryptjs | Stateless, padrأ£o de mercado |\n| SSO | OIDC via `openid-client` | Funciona com Entra ID, Auth0, Keycloak, etc. |\n| Mأ©tricas | `prom-client` | Padrأ£o Prometheus, dashboards Grafana prontos |\n| Infra | Docker Compose | Reprodutأ­vel em qualquer ambiente |\n| Reverse proxy | nginx (Alpine) | Serve build estأ،tico + proxy `/api` |\n\nDetalhes em [Arquitetura](./01-arquitetura.md).\n\n---\n\n## â‌“ Suporte\n\n- Problemas/bugs: registrar via canal interno da Bagre\n- Mudanأ§as/PRs: seguir o guia em [Desenvolvimento](./08-desenvolvimento.md)\n- Histأ³rico de alteraأ§أµes: tela `/admin/audit` na aplicaأ§أ£o\n\n---\n\nآ© Bagre آ· Sistema desenvolvido por **Fabricio Cruz**\n"},{"id":"arquitetura","title":"Arquitetura","icon":"ًںڈ›ï¸ڈ","content":"# Arquitetura\n\n> Documento tأ©cnico do Bagre. Para visأ£o funcional veja [Uso diأ،rio](./03-uso-diario.md).\n> **Autor**: Fabricio Cruz\n\n---\n\n## Visأ£o geral\n\nO sistema أ© uma aplicaأ§أ£o web de trأھs camadas distribuأ­da em trأھs contأھineres\nDocker independentes. Toda comunicaأ§أ£o entre serviأ§os usa a rede privada do\nCompose; apenas as portas necessأ،rias sأ£o expostas no host.\n\n```\n                          â”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ\n                          â”‚         host (macOS/Linux)      â”‚\n                          â”‚                                 â”‚\n   navegador  â”€â”€â”€â”€â”€â”€â–؛  :3000 (nginx)                        â”‚\n                          â”‚      â”‚                          â”‚\n                          â”‚      â–¼ proxy /api â†’ :3001       â”‚\n                          â”‚   :3001 (Fastify API)           â”‚\n                          â”‚      â”‚                          â”‚\n   curl/scripts â”€â”€â”€â”€â”€â”€â”€â”€â–؛ :3001 â”‚ JWT auth, RBAC, audit     â”‚\n                          â”‚      â”‚                          â”‚\n                          â”‚      â–¼                          â”‚\n                          â”‚   :5432 (Postgres) [host :5433] â”‚\n                          â”‚                                 â”‚\n                          â””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک\n\n   Zabbix (overlay) :8080 â—„â”€â”€ opcional, para testes locais\n```\n\n## Contأھineres\n\n### `bagre-db` â€” PostgreSQL 16\n- Imagem: `postgres:16-alpine`\n- Porta exposta: `5433` no host\n- Volume: `db_data` (persistente entre restarts)\n- Credenciais: `bagre` / `bagre` / db `bagre`\n- Healthcheck via `pg_isready`\n\n### `bagre-api` â€” backend Node.js\n- Imagem custom (Debian slim + Node 20 + OpenSSL)\n- Porta exposta: `3001`\n- Variأ،veis de ambiente principais:\n  - `DATABASE_URL` (aponta para `db:5432`)\n  - `JWT_SECRET` (assinatura de tokens)\n  - `BOOTSTRAP_ADMIN_EMAIL` / `BOOTSTRAP_ADMIN_PASSWORD`\n  - `INGEST_TOKEN` (para integraأ§أµes externas)\n- Comportamento de boot:\n  1. `npx prisma db push` (aplica schema)\n  2. `node src/import.js --if-empty /app/seed.json` (popula da planilha se DB vazio)\n  3. `node src/index.js` (inicia o servidor)\n\n### `bagre-web` â€” frontend\n- Build multi-stage: Node 20 (build Vite) â†’ nginx Alpine (serve)\n- Porta exposta: `3000`\n- nginx faz proxy reverso de `/api` e `/metrics` para o serviأ§o `api:3001`\n- SPA fallback: rotas que nأ£o existem fisicamente caem em `/index.html`\n\n### `bagre-zabbix-*` (overlay opcional)\nPara testes locais: `docker-compose.zabbix-dev.yml` adiciona um Zabbix completo\n(DB prأ³prio + server + web). Nأ£o roda em produأ§أ£o. Detalhes em\n[Integraأ§أµes](./05-integracoes.md).\n\n---\n\n## Modelo de dados\n\nSchema Prisma em `apps/api/prisma/schema.prisma`. Resumo das tabelas principais:\n\n### Core (gestأ£o de endereأ§amento)\n\n```prisma\nmodel Site {\n  id          Int      @id @default(autoincrement())\n  code        String   @unique\n  name        String\n  description String?\n  subnets     Subnet[]\n}\n\nmodel Subnet {\n  id          Int        @id @default(autoincrement())\n  siteId      Int\n  site        Site       @relation(...)\n  name        String\n  cidr        String?\n  cidrLabel   String?\n  vlanId      Int?\n  description String?\n  ips         IpAddress[]\n  @@unique([siteId, name])\n}\n\nenum IpStatus { FREE USED RESERVED CONFLICT }\n\nmodel IpAddress {\n  id             Int       @id @default(autoincrement())\n  subnetId       Int\n  subnet         Subnet    @relation(...)\n  address        String\n  type           String?   // \"Servidor Linux\", \"Switch Cisco\", etc\n  hostname       String?\n  function       String?\n  status         IpStatus  @default(FREE)\n  notes          String?\n  // Enriquecimento automأ،tico (Zabbix/scanners)\n  macAddress     String?\n  osInfo         String?   // \"Ubuntu 22.04 LTS\", \"Windows Server 2019\"\n  vendor         String?\n  model          String?\n  // Liveness\n  lastSeenAt     DateTime?\n  lastSeenSource String?   // \"zabbix\" | \"nmap-agent\" | \"manual\"\n  externalRef    String?   // \"zabbix:host:1042\"\n  @@unique([subnetId, address])\n  @@index([address])\n  @@index([hostname])\n  @@index([macAddress])\n  @@index([lastSeenAt])\n}\n```\n\n### Auth e RBAC\n\n```prisma\nenum Role { ADMIN READER }\n\nmodel User {\n  id             Int       @id @default(autoincrement())\n  email          String    @unique\n  name           String?\n  passwordHash   String?\n  role           Role      @default(READER)\n  active         Boolean   @default(true)\n  mustChangePwd  Boolean   @default(false)\n  authProvider   String    @default(\"local\") // local | oidc\n  externalId     String?   @unique\n  externalGroups String[]  @default([])\n  lastLoginAt    DateTime?\n}\n\nmodel PasswordResetToken {\n  id         Int       @id @default(autoincrement())\n  userId     Int\n  token      String    @unique\n  expiresAt  DateTime\n  consumedAt DateTime?\n}\n```\n\n### Auditoria e configuraأ§أµes\n\n```prisma\nmodel AuditLog {\n  id        Int      @id @default(autoincrement())\n  entity    String   // \"site\" | \"subnet\" | \"ip\" | \"user\" | \"zabbix_config\" | etc\n  entityId  Int\n  action    String   // \"create\" | \"update\" | \"delete\" | \"login\" | \"sync\" | etc\n  before    Json?    // estado anterior (para updates/deletes)\n  after     Json?    // estado novo (para creates/updates)\n  actor     String?  // email do usuأ،rio, ou \"ingest\", \"oidc\", etc\n  createdAt DateTime @default(now())\n}\n\nmodel OidcConfig    { /* configuraأ§أ£o SSO Microsoft Entra ID */ }\nmodel ZabbixConfig  { /* configuraأ§أ£o da integraأ§أ£o Zabbix */ }\nmodel FirewallRule  { /* regras importadas da aba \"Azure - SCE\" */ }\nmodel EquinixVlan   { /* VLANs Equinix importadas da planilha */ }\nmodel AzureSubnet   { /* subnets Azure importadas da planilha */ }\nmodel MasterRange   { /* CIDRs mestres da empresa */ }\nmodel CidrReference { /* tabela de referأھncia prefixoâ†’mأ،scara */ }\n```\n\n---\n\n## Estrutura de pastas\n\n```\nbagre/\nâ”œâ”€â”€ docker-compose.yml              # stack principal\nâ”œâ”€â”€ docker-compose.zabbix-dev.yml   # overlay opcional\nâ”œâ”€â”€ .env / .env.example\nâ”œâ”€â”€ apps/\nâ”‚   â”œâ”€â”€ api/\nâ”‚   â”‚   â”œâ”€â”€ Dockerfile\nâ”‚   â”‚   â”œâ”€â”€ package.json\nâ”‚   â”‚   â”œâ”€â”€ prisma/schema.prisma    # modelo de dados\nâ”‚   â”‚   â””â”€â”€ src/\nâ”‚   â”‚       â”œâ”€â”€ index.js            # bootstrap do Fastify\nâ”‚   â”‚       â”œâ”€â”€ db.js               # cliente Prisma compartilhado\nâ”‚   â”‚       â”œâ”€â”€ auth.js             # guards (requireAuth, requireAdmin)\nâ”‚   â”‚       â”œâ”€â”€ audit.js            # logger de auditoria\nâ”‚   â”‚       â”œâ”€â”€ cidr.js             # math IPv4 (expandCidr, etc)\nâ”‚   â”‚       â”œâ”€â”€ import.js           # importador da planilha â†’ DB\nâ”‚   â”‚       â”œâ”€â”€ auth-providers/\nâ”‚   â”‚       â”‚   â””â”€â”€ oidc.js         # cliente OIDC (Entra ID)\nâ”‚   â”‚       â”œâ”€â”€ integrations/\nâ”‚   â”‚       â”‚   â””â”€â”€ zabbix.js       # cliente JSON-RPC + scheduler\nâ”‚   â”‚       â””â”€â”€ routes/             # endpoints (sites, subnets, ips, etc)\nâ”‚   â””â”€â”€ web/\nâ”‚       â”œâ”€â”€ Dockerfile (multi-stage)\nâ”‚       â”œâ”€â”€ nginx.conf              # proxy /api e /metrics\nâ”‚       â”œâ”€â”€ package.json\nâ”‚       â”œâ”€â”€ vite.config.js\nâ”‚       â”œâ”€â”€ tailwind.config.js\nâ”‚       â””â”€â”€ src/\nâ”‚           â”œâ”€â”€ main.jsx            # entrypoint React\nâ”‚           â”œâ”€â”€ App.jsx             # router + rotas protegidas\nâ”‚           â”œâ”€â”€ api.js              # cliente fetch + auth\nâ”‚           â”œâ”€â”€ auth/AuthContext.jsx\nâ”‚           â”œâ”€â”€ components/         # Layout, Modal, Toast, etc\nâ”‚           â””â”€â”€ pages/              # uma rota por arquivo\nâ”œâ”€â”€ data/\nâ”‚   â””â”€â”€ Controle de IP - LAN.xlsx   # planilha original (read-only)\nâ”œâ”€â”€ scripts/\nâ”‚   â”œâ”€â”€ extract_xlsx.py             # xlsx â†’ seed.json\nâ”‚   â”œâ”€â”€ seed-zabbix-dev.mjs         # popula Zabbix de teste\nâ”‚   â”œâ”€â”€ update-metas.mjs            # gera METAS.md + metas.html\nâ”‚   â””â”€â”€ record-demo.mjs             # gera vأ­deo demo via Playwright\nâ”œâ”€â”€ schema/\nâ”‚   â””â”€â”€ bagre.project.schema.json\nâ”œâ”€â”€ docs/                           # esta documentaأ§أ£o\nâ””â”€â”€ demos/                          # vأ­deos gerados\n```\n\n---\n\n## Seguranأ§a\n\n### Autenticaأ§أ£o\n- **JWT HS256** com `JWT_SECRET` configurأ،vel (padrأ£o dev: `please-change-this-secret-32-chars-min`)\n- TTL do token: **8 horas**\n- Senha local com **bcrypt** (cost factor 10)\n- SSO via **OIDC** opcional (PKCE + state + nonce)\n\n### Autorizaأ§أ£o\nHook global `onRequest` no Fastify:\n1. Skip para rotas em `PUBLIC` (login, reset, health, /metrics, ingest)\n2. Verifica JWT\n3. Carrega usuأ،rio do DB (recheca `active`)\n4. Para mأ©todos de escrita (POST/PATCH/PUT/DELETE), exige `role=ADMIN`\n\nEndpoints sensأ­veis (sem JWT) protegidos por tokens dedicados:\n- `INGEST_TOKEN` â€” para POST `/api/ingest/*` (scanners, OTEL collectors)\n- `ADMIN_TOKEN` â€” para POST `/api/import/seed` (reimportar planilha)\n\n### Auditoria\nTodo mutador chama `auditFromReq(req, { entity, entityId, action, before, after })`.\nTokens e secrets sأ£o **mascarados** antes de virar log (ex: `â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢AB12`).\n\n### CORS\nHabilitado com `credentials: true`. Em produأ§أ£o, restringir origens via env var.\n\n---\n\n## Fluxos crأ­ticos\n\n### 1. Login local\n```\nPOST /api/auth/login {email, password}\n  â†’ bcrypt.compare â†’ ok\n  â†’ atualiza lastLoginAt\n  â†’ audit (action=login)\n  â†’ reply.jwtSign\n  â†’ 200 { token, user }\n```\n\n### 2. Login via SSO (Entra ID)\n```\nGET /api/auth/sso/start\n  â†’ cookie HttpOnly com state/nonce/codeVerifier\n  â†’ 302 redirect para Microsoft\n\nGET /api/auth/sso/callback?code=&state=\n  â†’ openid-client validates\n  â†’ fetch userinfo\n  â†’ upsert User (matching externalId ou email)\n  â†’ mapRole baseado em groups\n  â†’ reply.jwtSign\n  â†’ redirect para frontend /sso-callback?token=\n```\n\n### 3. Sincronizaأ§أ£o Zabbix\n```\nscheduler tick (a cada N min) ou POST /api/admin/zabbix-config/sync\n  â†’ host.get com selectInventory: 'extend'\n  â†’ para cada interface IP, monta discovery\n  â†’ applyDiscoveries â†’ busca IpAddress por address â†’ update\n  â†’ ZabbixConfig.lastSync* atualizado\n  â†’ audit (entity=zabbix_config, action=sync)\n```\n\n### 4. Ediأ§أ£o inline de IP\n```\nPATCH /api/ips/:id  { hostname, type, function, ... }\n  â†’ fetchBefore\n  â†’ inferStatus (FREE se vazio, USED se preenchido, ou explأ­cito)\n  â†’ update\n  â†’ audit (entity=ip, action=update, before, after)\n```\n\n---\n\n## Performance e escalabilidade\n\n### أچndices ativos\n- `IpAddress.address` (busca por IP)\n- `IpAddress.hostname` (busca por nome)\n- `IpAddress.macAddress`\n- `IpAddress.lastSeenAt` (saأ؛de da rede)\n- `Site.code`, `Subnet.(siteId,name)`, `User.email`, `User.externalId` (uniques)\n- `AuditLog.(entity, entityId)` (drill-down por entidade)\n\n### Limites operacionais\n\n| Mأ©trica | Limite atual | Como aumentar |\n|---|---|---|\n| IPs por subnet (geraأ§أ£o) | 4096 | Editar `expandCidr` em `cidr.js` |\n| Tamanho de upload | 50 MB | `multipart.fileSize` em `index.js` |\n| Concurrent connections | herda do nginx (1024) | nginx.conf |\n| TTL de sessأ£o | 8h | `TOKEN_TTL_MIN` em `routes/auth.js` |\n\n### Capacity planning\n\nEm escala atual (10k IPs, 50 subnets, 10 usuأ،rios simultأ¢neos):\n- DB usa < 50 MB\n- API usa < 100 MB de RAM\n- Tempo mأ©dio de resposta: < 50ms para CRUD, < 200ms para search global\n\nPara escalar 100أ—:\n- Adicionar **Redis** para cache de sessأ£o e listas\n- Replicaأ§أ£o Postgres para read scaling\n- nginx com SSL terminator e rate limiting\n"},{"id":"instalacao","title":"Instalaأ§أ£o","icon":"ًںڑ€","content":"# Instalaأ§أ£o\n\n> Como subir o ambiente do zero, configurar e fazer o primeiro login.\n> **Autor**: Fabricio Cruz\n\n---\n\n## Prأ©-requisitos\n\n| Item | Versأ£o mأ­nima | Como verificar |\n|---|---|---|\n| Docker | 27.x | `docker --version` |\n| Docker Compose v2 | 2.30+ | `docker compose version` |\n| Memأ³ria disponأ­vel | 4 GB | Docker Desktop / Colima `--memory 4` |\n| Porta livre 3000 | (web) | `lsof -i :3000` |\n| Porta livre 3001 | (api) | `lsof -i :3001` |\n| Porta livre 5433 | (db) | `lsof -i :5433` |\n\n> Em macOS sem Docker Desktop, usar **Colima**:\n> `brew install colima docker docker-compose`\n> `colima start --cpu 2 --memory 4 --disk 30`\n> `mkdir -p ~/.docker/cli-plugins && ln -sf /opt/homebrew/opt/docker-compose/bin/docker-compose ~/.docker/cli-plugins/docker-compose`\n\n---\n\n## Subida bأ،sica (3 passos)\n\n```bash\n# 1. Clone/acesse o repositأ³rio\ncd /Users/fabricio/Documents/code/bagre\n\n# 2. Crie o .env a partir do exemplo\ncp .env.example .env\n\n# 3. Suba a stack\ndocker compose up -d --build\n```\n\nAguarde ~30 segundos. Verifique com:\n\n```bash\ndocker compose ps\n# 3 contأھineres devem estar Up: bagre-{db,api,web}\n\ncurl -s http://localhost:3001/api/health\n# {\"ok\":true,\"ts\":\"...\"}\n```\n\nAbra **http://localhost:3000** no navegador.\n\n---\n\n## Variأ،veis de ambiente (`.env`)\n\n| Variأ،vel | Default | Descriأ§أ£o |\n|---|---|---|\n| `ADMIN_TOKEN` | `change-me` | Token para reimportaأ§أ£o via API (`POST /api/import/seed`) |\n| `INGEST_TOKEN` | `change-me-ingest` | Token para integraأ§أµes externas (scanners, OTEL) |\n| `JWT_SECRET` | `please-change-this-secret-32-chars-min` | Assinatura de tokens JWT â€” **mude em produأ§أ£o** |\n| `BOOTSTRAP_ADMIN_EMAIL` | `admin@bagre.local` | Email do admin criado no primeiro boot |\n| `BOOTSTRAP_ADMIN_PASSWORD` | `admin123` | Senha inicial do admin (forأ§ada a trocar) |\n\n> âڑ  **Em produأ§أ£o**, gere um `JWT_SECRET` aleatأ³rio com no mأ­nimo 32 caracteres\n> e tokens أ؛nicos para `ADMIN_TOKEN` e `INGEST_TOKEN`.\n>\n> ```bash\n> openssl rand -base64 48\n> ```\n\n---\n\n## Primeiro login\n\n1. Abra http://localhost:3000\n2. Email: `admin@bagre.local`\n3. Senha: `admin123` (ou o valor de `BOOTSTRAP_ADMIN_PASSWORD`)\n4. O sistema **forأ§a a troca de senha** no primeiro login\n5. Defina uma senha nova (mأ­nimo 8 caracteres)\n6. Pronto â€” vocأھ estأ، logado como ADMIN\n\n---\n\n## Importaأ§أ£o inicial da planilha\n\nColoque uma planilha em `data/*.xlsx` (formato esperado documentado em\n`docs/08-desenvolvimento.md`) e ela أ© importada **automaticamente** no\nprimeiro boot, **se o banco estiver vazio**.\n\nA importaأ§أ£o cria, conforme o conteأ؛do da planilha:\n- Sites (com `code` e `name`)\n- Subnets (com CIDR, nome, range)\n- IPs (todos os endereأ§os de cada subnet)\n- Regras de Firewall (opcional)\n- VLANs e mapeamentos de cloud (opcional)\n- 146 Master Ranges\n- 32 entradas de referأھncia CIDR\n\n### Reimportaأ§أ£o manual\n\nSe a planilha for atualizada, reimporte assim:\n\n```bash\n# 1. Regere o seed.json a partir do xlsx (requer Python + openpyxl)\npython3 scripts/extract_xlsx.py\n# Output: scripts/seed.json\n\n# 2. Force a importaأ§أ£o (idempotente, faz upsert)\ndocker compose exec api node src/import.js /app/seed.json\n```\n\n> O importador أ© **idempotente**: atualiza linhas existentes e cria novas\n> sem apagar dados manuais. Mas atenأ§أ£o: se a planilha tiver um valor\n> \"errado\" para um IP, ele sobrescreverأ، o valor atual no DB. Para preservar\n> dados manuais, use o `--if-empty` flag (que sأ³ importa se o DB estiver vazio).\n\n### Reimportaأ§أ£o via API (sem precisar entrar no contأھiner)\n\n```bash\ncurl -X POST http://localhost:3001/api/import/seed \\\n  -H \"X-Admin-Token: $ADMIN_TOKEN\"\n```\n\n---\n\n## Subindo o overlay de teste do Zabbix\n\nPara testar a integraأ§أ£o com Zabbix sem precisar conectar a um Zabbix real,\nuse o overlay incluso:\n\n```bash\n# Sobe Zabbix server + web + DB ao lado do IPAM\ndocker compose -f docker-compose.yml -f docker-compose.zabbix-dev.yml up -d\n\n# Aguarde ~60 segundos para o Zabbix inicializar\n\n# Popule hosts fictأ­cios com inventأ،rio rico (OS, MAC, vendor)\nnode scripts/seed-zabbix-dev.mjs\n```\n\nDepois, no IPAM:\n- Acesse `/admin/integrations/zabbix`\n- URL: `http://bagre-zabbix-web:8080`\n- Usuأ،rio: `Admin` آ· Senha: `zabbix`\n- Clique **Testar conexأ£o** â†’ **Salvar** â†’ **Habilitar sincronizaأ§أ£o**\n\nDetalhes em [Integraأ§أµes](./05-integracoes.md).\n\nPara parar sأ³ o Zabbix dev:\n\n```bash\ndocker compose -f docker-compose.zabbix-dev.yml down\n```\n\n---\n\n## Atualizaأ§أ£o do sistema\n\nQuando houver mudanأ§as no cأ³digo (pull de nova versأ£o):\n\n```bash\ngit pull  # (se usar git)\n\n# Rebuild dos contأھineres com cache\ndocker compose up -d --build api web\n\n# Se mudou o schema Prisma, db push roda automaticamente no boot\ndocker compose logs api --tail 30\n```\n\n> Mudanأ§as destrutivas no schema (DROP TABLE, etc) podem requerer\n> `--accept-data-loss`. Faأ§a backup antes (veja [Operaأ§أ£o](./07-operacao.md)).\n\n---\n\n## Desinstalaأ§أ£o completa\n\n```bash\n# Para tudo (mantأ©m volume do DB)\ndocker compose down\n\n# Remove tudo INCLUSIVE volume (apaga o banco)\ndocker compose down -v\n\n# Remove imagens construأ­das\ndocker rmi bagre-api bagre-web\n\n# Para o overlay do Zabbix dev se estiver rodando\ndocker compose -f docker-compose.zabbix-dev.yml down -v\n```\n\n---\n\n## Troubleshooting\n\n### Containers reiniciando em loop\n\n```bash\ndocker compose logs api --tail 50\n```\n\nCausas comuns:\n- `db` nأ£o estأ، saudأ،vel ainda (aguarde 30s)\n- `JWT_SECRET` muito curto (mأ­nimo 32 chars)\n- Porta 3001 jأ، ocupada â†’ mudar em `docker-compose.yml`\n\n### \"Could not parse schema engine response\"\n\nIsso significa Prisma com problema de OpenSSL. O Dockerfile usa\n`debian-bookworm-slim` justamente para resolver. Se aparecer:\n\n```bash\ndocker compose build --no-cache api\ndocker compose up -d api\n```\n\n### Frontend mostra tela em branco\n\n- Hard reload: `Cmd+Shift+R`\n- Verificar console do navegador (F12)\n- Verificar bundle: `curl -s http://localhost:3000/ | grep '<title>'`\n\n### Login retorna 401 com credenciais corretas\n\nProvavelmente vocأھ trocou a senha em sessأ£o anterior e perdeu. Reset:\n\n```bash\ndocker compose exec api node -e \"\nconst bcrypt = require('bcryptjs');\nconst { PrismaClient } = require('@prisma/client');\nconst p = new PrismaClient();\n(async () => {\n  const hash = await bcrypt.hash('admin123', 10);\n  await p.user.update({\n    where: { email: 'admin@bagre.local' },\n    data: { passwordHash: hash, mustChangePwd: false }\n  });\n  await p.\\$disconnect();\n})();\"\n```\n"},{"id":"uso-diario","title":"Uso diأ،rio","icon":"ًں–¥ï¸ڈ","content":"# Uso diأ،rio\n\n> Como navegar e operar o IPAM no dia a dia (admin ou reader).\n> **Autor**: Fabricio Cruz\n\n---\n\n## Login\n\n1. http://localhost:3000\n2. Email + senha\n3. âŒک+Enter ou clica **Entrar**\n\nSe o admin tiver habilitado SSO Microsoft, aparecerأ، um botأ£o **Entrar com Microsoft** abaixo do formulأ،rio. Detalhes em [Integraأ§أµes](./05-integracoes.md#sso-microsoft-entra-id).\n\nEsqueceu a senha â†’ link **Esqueci a senha** â†’ fluxo descrito em [Administraأ§أ£o](./04-administracao.md#reset-de-senha).\n\n---\n\n## Layout\n\n```\nâ”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”¬â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ\nâ”‚ ًںگں BAGRE     â”‚  busca global âŒکK            [avatar â–¾]   â”‚\nâ”œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”¼â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”¤\nâ”‚              â”‚                                           â”‚\nâ”‚ Dashboard    â”‚                                           â”‚\nâ”‚ Sites & Sub. â”‚                                           â”‚\nâ”‚ Catأ،logos    â”‚            CONTEأڑDO PRINCIPAL              â”‚\nâ”‚ Firewall     â”‚                                           â”‚\nâ”‚ Calc CIDR    â”‚                                           â”‚\nâ”‚ Integ./API   â”‚                                           â”‚\nâ”‚ Saأ؛de rede âک… â”‚                                           â”‚\nâ”‚ Integraأ§أµesâک… â”‚                                           â”‚\nâ”‚ Usuأ،rios âک…   â”‚                                           â”‚\nâ”‚ Auditoria âک…  â”‚                                           â”‚\nâ”‚              â”‚                                           â”‚\nâ”‚ âک¾ Tema       â”‚                                           â”‚\nâ””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”´â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک\n        âک… visأ­vel apenas para perfil ADMIN\n```\n\n---\n\n## Dashboard\n\nPأ،gina inicial apأ³s login. Mostra:\n\n- **Saudaأ§أ£o** com seu nome\n- **4 atalhos visuais**: Ver IPs por site آ· Calculadora CIDR آ· Firewall آ· Integraأ§أµes\n- **Resumo**: total de sites آ· subnets آ· IPs em uso آ· IPs livres آ· % utilizado\n- **Utilizaأ§أ£o por site**: barra de progresso colorida (verde/amarelo/vermelho)\n\nCores das barras:\n- ًںں¢ verde: atأ© 50% de uso\n- ًںں، amarelo: 50-80%\n- ًں”´ vermelho: > 80% (alerta de capacity)\n\n---\n\n## Sites & Subnets\n\nLista todos os sites em cards. Cada card mostra:\n\n- **Cأ³digo** do site (ex: BAGRE-SP3)\n- **Resumo** (X subnets آ· Y/Z IPs em uso)\n- Lista de subnets com **barra de progresso** individual e CIDR\n- Click numa subnet â†’ detalhe da subnet (lista de IPs)\n\n### Buscar site/subnet especأ­fica\n\nCampo \"Filtrar por site, subnet ou CIDRâ€¦\" no topo da pأ،gina filtra em tempo real.\n\n### Criar novo site (ADMIN)\n\n1. Botأ£o **+ Novo site** no canto superior direito\n2. Code: identificador curto (ex: `SP3-NEW-DC`)\n3. Nome amigأ،vel (opcional, ex: `Datacenter SP3 expansأ£o`)\n4. Descriأ§أ£o (opcional)\n5. **Criar site**\n\n### Criar nova subnet (ADMIN)\n\n1. No card do site, clica **â‹¯** â†’ **Nova subnet**\n2. Nome: identificador da subnet (ex: `LAN-PROD-WEB`)\n3. **CIDR** (obrigatأ³rio): ex: `10.150.5.0/24`\n   - O sistema mostra preview: *\"Vai gerar 254 IPs utilizأ،veis\"*\n4. VLAN ID (opcional)\n5. Descriأ§أ£o (opcional)\n6. **Criar subnet**\n\n> Os IPs sأ£o gerados automaticamente. Para uma /24 sأ£o 254 IPs livres.\n> Limite de geraأ§أ£o: **4096 IPs por subnet**.\n\n### Editar site / subnet (ADMIN)\n\nMenu **â‹¯** â†’ **Editar**. Pode mudar nome e descriأ§أ£o. CIDR de subnet **nأ£o pode** mudar (afetaria os IPs jأ، existentes).\n\n### Excluir site / subnet (ADMIN)\n\nMenu **â‹¯** â†’ **Excluir**. Confirmaأ§أ£o destrutiva mostra impacto: *\"Vai apagar X subnets e Y IPs. Aأ§أ£o definitiva.\"*\n\n---\n\n## Detalhe da subnet (lista de IPs)\n\nA tela mais usada do sistema.\n\n### Cabeأ§alho\n\n- Breadcrumb com site + nome da subnet\n- CIDR em monospace\n- **Card de utilizaأ§أ£o**: contador grande \"X / Y\" + % + barra colorida + legenda (ًں”µ em uso ًںں، reservado ًںں¢ livre)\n\n### Toolbar\n\n- ًں”چ **Buscar IP, hostname, funأ§أ£oâ€¦** (filtra em tempo real)\n- **Pأ­lulas de status**: [Todos] [Em uso] [Reservados] [Livres]\n- â†» **Recarregar**\n\n### Tabela\n\nColunas:\n1. **Endereأ§o** (font monospace)\n2. **Status** (badge colorido)\n3. **Equipamento** â€” Tipo + OS + vendor/modelo (vem do Zabbix)\n4. **Hostname** (editأ،vel inline)\n5. **MAC / Funأ§أ£o** â€” MAC address (vem do Zabbix) + funأ§أ£o do equipamento\n6. **Aأ§أµes** (apenas ADMIN)\n\n### Editar inline (ADMIN)\n\nClica em qualquer cأ©lula editأ،vel (Tipo, Hostname, Funأ§أ£o):\n1. Vira input\n2. Digite o valor\n3. **Enter** salva\n4. **Esc** cancela\n5. أچcone âœ“ (verde) tambأ©m salva, âœ— cancela\n\n> Se vocأھ preencher qualquer campo (tipo/hostname/funأ§أ£o), o status do IP\n> automaticamente muda para \"Em uso\". Para liberأ،-lo, use **Liberar**.\n\n### Reservar IP (ADMIN)\n\nBotأ£o **ًںں، Reservar** na coluna Aأ§أµes. Marca o IP como reservado (cor amarela). أڑtil para \"guardar\" IPs que serأ£o usados em breve.\n\n### Liberar IP (ADMIN)\n\nBotأ£o **Liberar** na coluna Aأ§أµes. Apaga todos os campos (tipo/hostname/funأ§أ£o/notes) e marca como livre.\n\n---\n\n## Catأ،logos\n\nListas auxiliares importadas da planilha original. Trأھs abas:\n\n### Ranges Mestre\nCIDRs corporativos com descriأ§أ£o (ex: `10.150.0.0/16 â€” Datacenter SP3`).\n\n### Equinix VLANs\nLista de VLANs do datacenter Equinix (Vlan ID, network, range, broadcast).\n\n### Azure Subnets\nLista de subnets das vNets Azure-SCE.\n\nEstes catأ،logos sأ£o **read-only** na UI. Atualizam quando a planilha أ© reimportada.\n\n---\n\n## Firewall\n\nTela com as regras de trأ،fego entre redes (Azure â†” Equinix). Cada linha tem:\n\n- **Sentido** (ex: \"EQX > Azure\")\n- Incoming Interface\n- Outgoing Interface\n- **Origem** (CIDR ou nome)\n- **Destino** (CIDR)\n- **Porta**\n- **Serviأ§o** (ssh, https, sql server, etc)\n- **Protocolo** (tcp/udp)\n\n### Criar regra (ADMIN)\n\nBotأ£o **+ Nova regra** â†’ linha em branco aparece â†’ preencha as colunas â†’ botأ£o **Salvar** azul aparece quando dirty â†’ confirma.\n\n### Excluir regra (ADMIN)\n\nأچcone ًں—‘ï¸ڈ vermelho ao final da linha.\n\n---\n\n## Calculadora CIDR\n\nCole um CIDR (ex: `10.150.0.0/24`) e veja:\n\n- Network address\n- Broadcast\n- Mأ،scara (decimal)\n- Primeiro IP utilizأ،vel\n- أڑltimo IP utilizأ،vel\n- Prefixo (em formato `/24`)\n- Total de endereأ§os\n- Endereأ§os utilizأ،veis\n\nAbaixo, **Tabela de referأھncia** completa de `/0` a `/32` com mأ،scara, total, utilizأ،veis e quantos `/24s` cabem.\n\n---\n\n## Busca global âŒکK\n\nAtalho **âŒکK** (ou `Ctrl+K` no Linux/Windows) abre a busca global. Funciona em qualquer tela.\n\nBusca em:\n- **IPs** (por endereأ§o, hostname, tipo, funأ§أ£o)\n- **Subnets** (por nome, CIDR, label)\n- **Sites** (por cأ³digo, nome)\n\nResultados sأ£o clicأ،veis e te levam direto pra subnet/site. Quando vocأھ abre um IP via busca, ele aparece **destacado em amarelo** na lista da subnet.\n\n> A busca exige no mأ­nimo 2 caracteres.\n\n---\n\n## Meu perfil\n\nMenu do canto superior direito â†’ **Meu perfil**:\n\n- Vأھ seu email e role\n- **Trocar senha** (requer senha atual)\n\nSe o admin tiver forأ§ado uma troca de senha (apأ³s reset), vocأھ cai aqui automaticamente apأ³s o login.\n\n---\n\n## Tema claro / escuro\n\nBotأ£o **âک¾ Tema escuro** / **âک€ Tema claro** no canto inferior esquerdo do menu lateral. Preferأھncia salva por usuأ،rio (localStorage).\n\n---\n\n## Atalhos de teclado\n\n| Atalho | Aأ§أ£o |\n|---|---|\n| `âŒکK` / `Ctrl+K` | Abre busca global |\n| `Enter` (em cأ©lula editأ،vel) | Salva |\n| `Esc` (em cأ©lula editأ،vel) | Cancela ediأ§أ£o |\n| `Tab` (em formulأ،rios) | Prأ³ximo campo |\n\n---\n\n## O que perfil READER vأھ de diferente\n\n- Sem botأµes \"Novo site\", \"Nova subnet\", \"Editar\"\n- Sem menu **â‹¯** nos cards de site/subnet\n- IPs aparecem como texto, nأ£o editأ،veis\n- Botأµes **Reservar** e **Liberar** ocultos\n- Pأ،ginas administrativas (`/admin/*`) nأ£o aparecem na sidebar\n- Banner **ًں”’ somente leitura** em telas que normalmente teriam aأ§أµes\n\nTudo verificado tambأ©m na API: tentativas de PATCH/POST/DELETE retornam **403 forbidden**.\n"},{"id":"administracao","title":"Administraأ§أ£o","icon":"ًں› ï¸ڈ","content":"# Administraأ§أ£o\n\n> Operaأ§أµes exclusivas do perfil ADMIN: gestأ£o de usuأ،rios, criaأ§أ£o de sites/subnets, importaأ§أ£o, auditoria.\n> **Autor**: Fabricio Cruz\n\n---\n\n## Acesso administrativo\n\nAo logar com perfil **ADMIN**, a sidebar mostra um bloco extra:\n\n- **Saأ؛de da rede** â€” IPs stale, fantasmas, conflitos\n- **Integraأ§أµes** â€” status consolidado dos conectores\n- **Usuأ،rios** â€” gestأ£o de contas\n- **SSO / Entra ID** â€” configuraأ§أ£o de SSO\n- **Auditoria** â€” log completo de alteraأ§أµes\n\n---\n\n## Gestأ£o de usuأ،rios\n\n### Visualizar usuأ،rios\n\nSidebar â†’ **Usuأ،rios**. Mostra tabela com:\n- **E-mail**\n- **Nome**\n- **Perfil** (combo ADMIN / READER, editأ،vel inline)\n- **Status** (ativo / inativo)\n- **أڑltimo login**\n- Aأ§أµes: ًں”‘ **reset** آ· âڈ» **desativar/reativar** آ· ًں—‘ï¸ڈ **remover**\n\n### Criar usuأ،rio novo\n\n1. Botأ£o **+ Novo usuأ،rio**\n2. **E-mail** (obrigatأ³rio, أ؛nico)\n3. **Nome** (opcional)\n4. **Perfil**: READER (padrأ£o, leitura) ou ADMIN\n5. **Senha inicial** (opcional):\n   - Se preenchida: usuأ،rio pode fazer login imediatamente\n   - Se vazia: o sistema gera um **link de definiأ§أ£o de senha** que aparece num banner amarelo no topo da pأ،gina, com botأ£o \"copiar link\". Envie o link ao usuأ،rio (vأ،lido por 7 dias)\n\n### Promover/rebaixar usuأ،rio\n\nMude o combo \"Perfil\" diretamente na tabela. Mudanأ§a أ© gravada com auditoria.\n\n> Vocأھ nأ£o consegue mudar o seu prأ³prio perfil (combo desabilitado).\n\n### Desativar usuأ،rio\n\nBotأ£o **âڈ» desativar**. O usuأ،rio nأ£o consegue mais logar, mas o histأ³rico dele continua.\n\n> Para reativar, mesmo botأ£o (vira **âڈ» reativar**).\n\n### Resetar senha de um usuأ،rio\n\nBotأ£o **ًں”‘ reset**. Sistema gera um token أ؛nico, banner amarelo aparece no topo com:\n- E-mail do usuأ،rio\n- Link copiأ،vel (`http://.../reset?token=XXXX`)\n- Aviso: vأ،lido 7 dias, uso أ؛nico\n\nEnvie o link ao usuأ،rio (Slack, email, qualquer canal). Quando ele abrir, vai cair direto na tela de reset.\n\n### Remover usuأ،rio\n\nBotأ£o ًں—‘ï¸ڈ â†’ confirmaأ§أ£o. Restriأ§أµes:\n- Nأ£o pode remover vocأھ mesmo\n- Nأ£o pode remover o **أ؛ltimo admin ativo** (proteأ§أ£o contra lockout)\n\n---\n\n## Reset de senha (fluxo do usuأ،rio final)\n\nQuando um usuأ،rio esquece a senha:\n\n1. Acessa http://localhost:3000/login\n2. Clica **Esqueci a senha**\n3. Aba 1 â€” **Solicitar**: digita email â†’ clica \"Solicitar token\"\n   - Sistema gera o token e **registra nos logs do servidor** (no MVP local, sem SMTP)\n   - O usuأ،rio precisa pedir o token a um admin (que vأھ nos logs ou gera via UI)\n4. Aba 2 â€” **Aplicar token**: cola o token + nova senha (mأ­nimo 8 chars) â†’ \"Redefinir senha\"\n5. Cai direto na tela de login\n\n> **Caminho mais simples**: o admin gera o link via tela `/admin/users` â†’ ًں”‘ reset â†’ copia o link â†’ manda pro usuأ،rio. O usuأ،rio sأ³ precisa abrir o link.\n\n---\n\n## Trocar a prأ³pria senha\n\n1. Menu superior direito â†’ **Meu perfil**\n2. Senha atual + Nova senha + Confirme\n3. **Salvar**\n\nSe o sistema **forأ§ou** a troca (primeira senha pأ³s-reset), aparece banner amarelo: \"Troca de senha obrigatأ³ria. Vocأھ precisa definir uma nova senha antes de continuar.\" â€” vocأھ أ© redirecionado pra essa tela automaticamente.\n\n---\n\n## Criaأ§أ£o de sites e subnets\n\nVisto em detalhe em [Uso diأ،rio](./03-uso-diario.md#sites--subnets). Resumo:\n\n- **+ Novo site** no topo de `/sites`\n- **â‹¯ â†’ Nova subnet** no card de cada site\n- Subnet com CIDR vأ،lido **gera todos os IPs automaticamente** (atأ© 4096)\n- Excluir site **cascateia** subnets + IPs\n\n### Best practices\n\n- Use cأ³digo de site curto e أ؛nico (ex: `SP3-RACK-12`)\n- Use CIDR no formato canأ´nico (`10.150.0.0/24`, nأ£o `10.150.0.0/255.255.255.0`)\n- Documente a funأ§أ£o no campo \"Descriأ§أ£o\" da subnet\n- Use VLAN ID se aplicأ،vel (futuramente vai integrar com a aba VLANs do Equinix)\n\n---\n\n## Saأ؛de da rede\n\nSidebar â†’ **Saأ؛de da rede**. Mostra:\n\n### IPs stale\nMarcados como em uso (`USED`) mas que nأ£o foram vistos por nenhum scanner hأ، mais de N dias (configurأ،vel em `/admin/integrations/zabbix` â†’ \"Marcar como stale apأ³s\").\n\nCada linha tem:\n- **IP**\n- **Hostname**\n- **Localizaأ§أ£o** (site/subnet)\n- **أڑltima vez visto** (\"hأ، 12d\") com fonte\n- Link **abrir** que te leva pra subnet com o IP destacado\n\n### Conflitos\nIPs marcados manualmente como `CONFLICT` (mesmo IP em mأ؛ltiplos hostnames, ou outro problema detectado).\n\n### Fontes ativas\nBadges mostrando quantos IPs cada fonte de descoberta alimenta (ex: `zabbix آ· 16 IPs`).\n\n> Use essa tela como **TODO list** de saneamento. Cada IP stale أ© um candidato\n> a ser deprovisionado ou marcado como livre depois de validar.\n\n---\n\n## Auditoria\n\nSidebar â†’ **Auditoria**. Log imutأ،vel de **todas** as alteraأ§أµes no sistema.\n\n### Filtros\n- **Tipo de objeto** (IP, Site, Subnet, Regra firewall, Usuأ،rio, Zabbix config, OIDC config)\n- **Aأ§أ£o** (Criou, Editou, Removeu, Liberou, Reservou, Login, Trocou senha, Sync, etc)\n- **Usuأ،rio** (busca por substring no email)\n\n### Cada linha mostra:\n- **Quando** (timestamp)\n- **Quem** (email do usuأ،rio ou \"ingest\" / \"oidc\" / \"system\")\n- **Aأ§أ£o** (badge colorido)\n- **Objeto** (tipo + ID)\n- **Resumo** (campos mudados ou identificador-chave)\n\n### Detalhe completo\n\nBotأ£o **ver detalhe** â†’ modal com:\n- Metadata (quando, quem, aأ§أ£o, objeto)\n- **Diff lado a lado**: caixa vermelha (estado **antes**) e caixa verde (estado **depois**), em JSON formatado\n\n> Senhas, tokens e secrets sأ£o **mascarados** no log\n> (`â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢AB12`). O original nunca aparece.\n\n---\n\n## Importaأ§أ£o da planilha\n\nA planilha original `data/Controle de IP - LAN.xlsx` أ© a fonte primأ،ria no\nprimeiro boot. Depois disso, o sistema أ© a fonte de verdade.\n\n### Reimportar manualmente (caso a planilha seja atualizada)\n\n```bash\n# 1. Regere o seed.json\npython3 scripts/extract_xlsx.py\n\n# 2. Importe (idempotente)\ndocker compose exec api node src/import.js /app/seed.json\n```\n\n> O importador faz **upsert** por `(site, subnet, ip)`. Nأ£o apaga dados, mas pode sobrescrever se a planilha tiver valor para um campo que vocأھ editou no IPAM.\n\n### Reimportar via API (sem entrar no contأھiner)\n\n```bash\ncurl -X POST http://localhost:3001/api/import/seed \\\n  -H \"X-Admin-Token: $ADMIN_TOKEN\"\n```\n\nأڑtil para automaأ§أ£o (CI/CD).\n\n---\n\n## Configuraأ§أ£o SSO Microsoft Entra ID\n\nVisto em detalhe em [Integraأ§أµes](./05-integracoes.md#sso-microsoft-entra-id).\n\nResumo dos passos:\n1. Sidebar â†’ **SSO / Entra ID**\n2. Copia a Redirect URI mostrada\n3. Cria um App Registration no Azure Entra ID, cola a Redirect URI lأ،\n4. Volta no IPAM e cola: tenant ID + Client ID + Client Secret\n5. **Testar conexأ£o** â†’ âœ“ verde\n6. **Habilitar SSO**\n\nA partir daأ­, a tela de login mostra **\"Entrar com Microsoft\"** ao lado do formulأ،rio tradicional. Login local continua funcionando (fallback).\n\n---\n\n## Configuraأ§أ£o da integraأ§أ£o Zabbix\n\nSidebar â†’ **Integraأ§أµes** â†’ card Zabbix â†’ **Configurar** (ou diretamente `/admin/integrations/zabbix`).\n\nVisto em detalhe em [Integraأ§أµes](./05-integracoes.md#zabbix).\n\nResumo:\n- URL do Zabbix\n- API Token (recomendado) **ou** usuأ،rio/senha\n- Intervalo de sincronizaأ§أ£o (padrأ£o 15 min)\n- Quantos dias para marcar IPs como stale (padrأ£o 7)\n- Filtro opcional por grupos do Zabbix\n- Botأµes: **Testar conexأ£o**, **Salvar**, **Sincronizar agora**, **Habilitar/Pausar**\n\n---\n\n## Operaأ§أµes de emergأھncia\n\n### Desativar SSO temporariamente\n`/admin/sso` â†’ botأ£o **Desabilitar SSO** no topo. Nأ£o apaga a configuraأ§أ£o â€” apenas remove o botأ£o \"Entrar com Microsoft\" da tela de login. Login local continua funcionando.\n\n### Pausar sync Zabbix\n`/admin/integrations/zabbix` â†’ botأ£o **Pausar** no topo. O scheduler nأ£o roda mais atأ© vocأھ reativar.\n\n### Reset do admin via DB\nCaso vocأھ tenha perdido acesso a todas as contas admin:\n\n```bash\ndocker compose exec api node -e \"\nconst bcrypt = require('bcryptjs');\nconst { PrismaClient } = require('@prisma/client');\nconst p = new PrismaClient();\n(async () => {\n  const hash = await bcrypt.hash('NovaSenhaSegura123', 10);\n  await p.user.update({\n    where: { email: 'admin@bagre.local' },\n    data: { passwordHash: hash, mustChangePwd: false, role: 'ADMIN', active: true }\n  });\n  console.log('reset OK');\n  await p.\\$disconnect();\n})();\"\n```\n"},{"id":"integracoes","title":"Integraأ§أµes","icon":"ًں”Œ","content":"# Integraأ§أµes\n\n> Como conectar o IPAM a sistemas externos: Zabbix, Microsoft Entra ID (SSO), e ingestأ£o genأ©rica.\n> **Autor**: Fabricio Cruz\n\n---\n\n## Visأ£o geral\n\n```\n   â”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ   sync periأ³dico    â”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ\n   â”‚  Zabbix    â”‚ â—„â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”‚  IPAM    â”‚\n   â””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک                     â”‚          â”‚\n                                      â”‚          â”‚\n   â”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ   ingest API        â”‚          â”‚\n   â”‚  Scanners  â”‚ â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â–؛â”‚          â”‚\n   â”‚ nmap/OTEL  â”‚                     â”‚          â”‚\n   â””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک                     â”‚          â”‚\n                                      â”‚          â”‚\n   â”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ   /metrics scrape   â”‚          â”‚\n   â”‚ Prometheus â”‚ â—„â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”‚          â”‚\n   â””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک                     â”‚          â”‚\n                                      â”‚          â”‚\n   â”Œâ”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”گ   OIDC SSO          â”‚          â”‚\n   â”‚ Entra ID   â”‚ â—„â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”‚          â”‚\n   â””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک                     â””â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”ک\n```\n\nTodas as integraأ§أµes sأ£o **configurأ،veis pela UI** (zero env var para credenciais).\n\n---\n\n## Zabbix\n\nA integraأ§أ£o mais valiosa: o Zabbix jأ، sabe quais IPs estأ£o vivos, quais hosts existem, qual OS, etc. O IPAM consome essa informaأ§أ£o via API JSON-RPC.\n\n### Por que faz sentido\n\n- **Sem carga adicional na rede**: o Zabbix jأ، estأ، coletando, sأ³ estamos lendo\n- **Sem agentes novos**: nada a instalar\n- **Enriquecimento automأ،tico**: tipo de equipamento, OS, vendor, MAC vأھm do `host.inventory`\n- **Detecأ§أ£o de stale**: IPs que sumiram do Zabbix viram alerta no IPAM\n- **Detecأ§أ£o de fantasmas**: IPs vivos no Zabbix mas nأ£o cadastrados no IPAM\n\n### Configuraأ§أ£o passo a passo\n\n#### 1. No Zabbix\nCrie um API Token (recomendado, Zabbix 5.4+):\n- Administration â†’ Users â†’ Selecione o usuأ،rio â†’ **API tokens** â†’ **Create API token**\n- Permissأµes necessأ،rias: leitura em `Host` e `Hostgroup`\n- Copie o token gerado\n\nAlternativa: usar usuأ،rio/senha (Zabbix antigo). Crie um usuأ،rio read-only com permissأ£o em todos os hosts.\n\n#### 2. No IPAM\n1. Sidebar â†’ **Integraأ§أµes** â†’ card Zabbix â†’ **Configurar**\n2. **URL do Zabbix**: ex: `https://zabbix.empresa.local` (sem `/api_jsonrpc.php` no final)\n3. **API Token**: cole o token\n   - Ou expanda **\"ou usar usuأ،rio/senha\"** e preencha\n4. **Intervalo (minutos)**: padrأ£o 15\n5. **Marcar como stale apأ³s (dias)**: padrأ£o 7\n6. **Filtrar por grupos do Zabbix** (opcional): ex: `Production, Equinix-SP3`\n7. Clica **Salvar**\n8. Clica **Testar conexأ£o** â†’ toast verde \"Conexأ£o e auth OK آ· Zabbix 7.x\"\n9. Clica **Sincronizar agora** â†’ toast com estatأ­sticas (`X hosts آ· Y IPs atualizados آ· Z fantasmas`)\n10. Clica **Habilitar sincronizaأ§أ£o** â†’ vira automأ،tico a cada N minutos\n\n### O que أ© sincronizado\n\nPara cada host monitorado pelo Zabbix:\n- **Endereأ§o** (`host.interface.ip`)\n- **Hostname** (`host.name` ou `host.host`)\n- **Tipo** (derivado de `inventory.type`, OS e vendor)\n- **Funأ§أ£o** (concatenaأ§أ£o dos grupos do Zabbix)\n- **OS** (`inventory.os_full` ou `inventory.os`)\n- **Vendor** (`inventory.vendor`)\n- **Modelo** (`inventory.model`)\n- **MAC Address** (`inventory.macaddress_a`)\n- **Status** (`USED` se o host estأ، enabled, `RESERVED` se disabled)\n- **lastSeenAt** (timestamp da sync) e **lastSeenSource** (`zabbix`)\n\n### Mapeamento \"tipo de equipamento\"\n\nA funأ§أ£o `deriveType` em `apps/api/src/integrations/zabbix.js` decide o tipo amigأ،vel:\n\n| Critأ©rio | Resultado |\n|---|---|\n| `inventory.type` contأ©m \"router\" | Roteador |\n| `inventory.type` contأ©m \"switch\" | Switch |\n| `inventory.type` contأ©m \"firewall\" | Firewall |\n| `inventory.type` contأ©m \"workstation\" | Workstation |\n| `inventory.type` contأ©m \"printer\" | Impressora |\n| `inventory.type` contأ©m \"storage\" | Storage |\n| `inventory.os` contأ©m \"Windows\" | Servidor Windows |\n| `inventory.os` contأ©m \"Linux/Ubuntu/Debian/CentOS/RHEL\" | Servidor Linux |\n| `inventory.vendor` أ© Cisco/Mikrotik | Equipamento da fabricante |\n| `inventory.vendor` أ© Fortinet | Firewall |\n| (fallback) | \"Host\" ou `inventory.type` literal |\n\n### Status da integraأ§أ£o\n\n`/admin/integrations` mostra o card Zabbix com:\n- Badge **Funcionando** / **Configurado آ· pausado** / **Com erro** / **Nأ£o configurado**\n- أڑltima sync (data + âœ“/âœ—)\n- Estatأ­sticas (hosts آ· updated آ· ghosts)\n- IPs alimentados pelo Zabbix\n- Botأ£o **Testar agora** (live test)\n\n### Troubleshoot\n\n**\"Zabbix RPC: Incorrect user name or password\"**\nâ†’ Token invأ،lido ou senha errada. Tente um teste manual via curl.\n\n**\"Zabbix HTTP 502/503\"**\nâ†’ URL inacessأ­vel do contأھiner do IPAM. Verifique se o nome DNS resolve do contأھiner. Se for IP corporativo via VPN, lembre que o contأھiner nأ£o estأ، na sua VPN do Mac (rodaria em Linux na rede final).\n\n**\"sync ok mas updated=0\"**\nâ†’ Os IPs do Zabbix nأ£o batem com nenhum range cadastrado no IPAM. Cadastre as subnets que cobrem esses IPs primeiro.\n\n**\"sync ok com muitos ghosts\"**\nâ†’ Os IPs vivos no Zabbix nأ£o estأ£o cadastrados em subnets. Pode ser legأ­timo (subnets faltando) ou indicar problema de inventأ،rio.\n\n### Ambiente de testes local (sem Zabbix real)\n\nO repositأ³rio inclui um overlay `docker-compose.zabbix-dev.yml` que sobe um\nZabbix completo na sua mأ،quina:\n\n```bash\ndocker compose -f docker-compose.yml -f docker-compose.zabbix-dev.yml up -d\n# aguarde ~60s para o Zabbix inicializar\n\nnode scripts/seed-zabbix-dev.mjs\n# popula 17 hosts fictأ­cios com inventأ،rio rico (OS, vendor, MAC)\n\n# UI Zabbix: http://localhost:8080  (Admin / zabbix)\n# No IPAM, configure URL: http://bagre-zabbix-web:8080\n```\n\nOs hosts fictأ­cios incluem servidores Linux, Windows, switches Cisco,\nfirewalls Fortigate e workstations Lenovo/Apple â€” material rico para\ndemonstrar a integraأ§أ£o ao vivo.\n\n---\n\n## SSO Microsoft Entra ID\n\nOIDC com qualquer Identity Provider compatأ­vel (Entra ID / Azure AD por padrأ£o).\n\n### Custo\n\n**Zero** no tier Free do Entra ID. SSO de aplicaأ§أ£o custodiada nأ£o cobra.\nApenas Conditional Access avanأ§ado, PIM e risk-based MFA exigem P1/P2 (~US$ 6/usuأ،rio/mأھs), e isso أ© opcional.\n\n### Configuraأ§أ£o passo a passo\n\n#### 1. No Microsoft Entra ID\n1. Portal Azure â†’ **Microsoft Entra ID** â†’ **App registrations** â†’ **New registration**\n2. Nome: `Bagre`\n3. **Redirect URI**: copie do passo 2 abaixo\n4. Apأ³s criar, anote: **Application (client) ID** e **Directory (tenant) ID**\n5. Em **Certificates & secrets** â†’ **New client secret**, gere um secret e copie o valor\n\n#### 2. No IPAM\n1. Sidebar â†’ **SSO / Entra ID** (`/admin/sso`)\n2. **Redirect URI**: jأ، vem preenchida (`http://localhost/api/auth/sso/callback` em dev). **Copie** e cole no Entra ID\n3. **Issuer URL**: `https://login.microsoftonline.com/{TENANT_ID}/v2.0`\n4. **Client ID**: cole\n5. **Client Secret**: cole o secret gerado\n6. (Opcional) **Grupos que recebem perfil ADMIN**: cole os Object IDs dos grupos do Entra (separados por vأ­rgula). Usuأ،rios nesses grupos viram ADMIN automaticamente. Se vazio, todo novo usuأ،rio SSO أ© READER por padrأ£o (admin pode promover manualmente)\n7. **Perfil padrأ£o para novos usuأ،rios**: READER\n8. **Provisionamento automأ،tico**: marcado (cria usuأ،rio no primeiro login)\n9. Clica **Salvar configuraأ§أµes**\n10. Clica **Testar conexأ£o** â†’ \"OK â€” issuer https://login.microsoftonline.com/...\"\n11. Clica **Habilitar SSO**\n\nA partir daأ­, a tela de login mostra um botأ£o **\"Entrar com Microsoft\"** com o logo quadricolor. Quando clicado, redireciona ao Entra ID, faz o handshake OIDC, retorna ao IPAM autenticado.\n\n### Comportamento\n\n- **Primeiro login SSO**: cria usuأ،rio automaticamente no IPAM com `authProvider=oidc` e role mapeada\n- **Login subsequente**: atualiza grupos (caso o usuأ،rio tenha entrado em novos grupos no Entra), atualiza nome se mudou\n- **Login local sempre disponأ­vel** como fallback â€” proteأ§أ£o contra falha do IdP\n- **Auditoria**: cada login SSO gera entrada no AuditLog com `actor=email` e `action=login`\n\n### Mأ؛ltiplos providers\n\nO sistema أ© estruturado para suportar mأ؛ltiplos providers no futuro (Auth0, Keycloak, etc). Hoje sأ³ Entra ID/OIDC estأ، implementado.\n\n---\n\n## Ingestأ£o externa (scanners, OTEL, scripts)\n\nPara atualizar o IPAM a partir de **qualquer ferramenta externa** sem precisar de uma conta de usuأ،rio, use os endpoints de ingestأ£o.\n\n### Auth\nHeader `X-Ingest-Token: $INGEST_TOKEN`. Configurأ،vel em `.env` (variأ،vel `INGEST_TOKEN`).\n\n### Endpoint principal\n\n```\nPOST /api/ingest/discoveries\nContent-Type: application/json\nX-Ingest-Token: <INGEST_TOKEN>\n\n{\n  \"discoveries\": [\n    {\n      \"address\": \"10.150.0.10\",\n      \"hostname\": \"srv-prd-01\",\n      \"type\": \"Server\",\n      \"function\": \"Web\",\n      \"macAddress\": \"00:1A:A0:11:22:33\",\n      \"osInfo\": \"Ubuntu 22.04\",\n      \"vendor\": \"Dell\",\n      \"model\": \"PowerEdge R740\",\n      \"status\": \"USED\",\n      \"source\": \"nmap-scanner\",\n      \"siteCode\": \"BAGRE-SP3\"     // opcional, desambigua se IP em mأ؛ltiplas subnets\n    }\n  ]\n}\n```\n\nComportamento:\n- Faz match por `address` em todas as subnets (ou filtra por `siteCode` / `subnetCidr` se fornecido)\n- Atualiza apenas campos enviados (nأ£o apaga o que existe)\n- IPs nأ£o cadastrados retornam em `unmatched` (fantasmas)\n- Cada update cria entrada no AuditLog com `action=ingest` e `actor=$source`\n\n### Heartbeat (presenأ§a/queda)\n\nPara ferramentas de monitoring que querem sأ³ registrar liveness:\n\n```\nPOST /api/ingest/heartbeat\n{ \"address\": \"10.150.0.10\", \"alive\": true, \"source\": \"blackbox-exporter\" }\n```\n\nAtualiza `lastSeenAt`, opcionalmente o campo `notes`.\n\n### Exemplo: cron de scanner prأ³prio\n\n```bash\n#!/bin/bash\n# Scaneia e empurra para o IPAM\nfor IP in $(nmap -sn 10.150.0.0/24 -oG - | grep Up | awk '{print $2}'); do\n  curl -s -X POST http://ipam.empresa.local/api/ingest/discoveries \\\n    -H 'Content-Type: application/json' \\\n    -H \"X-Ingest-Token: $INGEST_TOKEN\" \\\n    -d \"{\\\"discoveries\\\":[{\\\"address\\\":\\\"$IP\\\",\\\"source\\\":\\\"nmap-cron\\\"}]}\"\ndone\n```\n\n---\n\n## Mأ©tricas Prometheus\n\nEndpoint pأ؛blico em `/metrics` (porta 3001 do API).\n\n### Mأ©tricas expostas\n\n| Mأ©trica | Tipo | Labels | Descriأ§أ£o |\n|---|---|---|---|\n| `bagre_ip_count` | gauge | `status,site,subnet` | IPs por status em cada subnet |\n| `bagre_subnet_utilization_ratio` | gauge | `site,subnet` | Uso da subnet (0..1) |\n| `bagre_subnet_total` | gauge | â€” | Total de subnets |\n| `bagre_site_total` | gauge | â€” | Total de sites |\n| `bagre_process_*` | counter/gauge | â€” | Mأ©tricas padrأ£o do Node.js (CPU, heap, GC) |\n\n### Scrape config\n\n```yaml\n# prometheus.yml\nscrape_configs:\n  - job_name: 'bagre'\n    metrics_path: /metrics\n    static_configs:\n      - targets: ['bagre-api:3001']\n```\n\n### Dashboards Grafana sugeridos\n\n- **Capacity heatmap**: `bagre_subnet_utilization_ratio` por site/subnet\n- **Top 10 subnets cheias**: `topk(10, bagre_subnet_utilization_ratio)`\n- **Crescimento de IPs em uso**: `rate(bagre_ip_count{status=\"USED\"}[7d])`\n- **IPs livres restantes**: `sum(bagre_ip_count{status=\"FREE\"}) by (site)`\n\n### Alertas Prometheus sugeridos\n\n```yaml\n- alert: SubnetQuaseCheia\n  expr: bagre_subnet_utilization_ratio > 0.85\n  for: 30m\n  annotations:\n    summary: \"Subnet {{ $labels.subnet }} ({{ $labels.site }}) com {{ $value }}% de uso\"\n\n- alert: SiteSemIPsLivres\n  expr: sum by (site) (bagre_ip_count{status=\"FREE\"}) < 10\n  for: 1h\n  annotations:\n    summary: \"Site {{ $labels.site }} com menos de 10 IPs livres\"\n```\n\n---\n\n## OTEL (OpenTelemetry)\n\nO sistema **nأ£o emite traces OTEL hoje** (nأ£o hأ، instrumentaأ§أ£o no cأ³digo). Mas أ© um prأ³ximo passo natural.\n\nComo comeأ§ar quando for o caso:\n1. Adicionar `@opentelemetry/api`, `@opentelemetry/sdk-node`, `@opentelemetry/auto-instrumentations-node`\n2. Iniciar o SDK no topo de `src/index.js`\n3. Apontar para um **OTLP collector** (Tempo, Jaeger, etc) via env var `OTEL_EXPORTER_OTLP_ENDPOINT`\n4. Auto-instrumentaأ§أ£o cobre Fastify, Prisma, fetch automaticamente\n\nEstimativa: 2-3 horas para integrar.\n\n---\n\n## Como adicionar uma integraأ§أ£o nova\n\nA estrutura أ© replicأ،vel:\n\n1. **Backend**: criar `apps/api/src/integrations/<nome>.js` com:\n   - `getConfig()` (lأھ do DB)\n   - `testConnection(cfg)` (verifica auth)\n   - `sync<Algo>(cfg)` (executa a operaأ§أ£o)\n   - `startScheduler(log)` (timer interno opcional)\n2. **Schema**: adicionar `<Nome>Config` no `schema.prisma` (single-row)\n3. **Rotas admin**: criar `apps/api/src/routes/<nome>.js` com `GET/PATCH/POST` para config + test + sync\n4. **Frontend**: criar pأ،gina `apps/web/src/pages/<Nome>Settings.jsx` (form + botأµes)\n5. **Aggregaأ§أ£o**: incluir o status da nova integraأ§أ£o em `routes/integrations-status.js`\n6. **Sidebar**: adicionar item em `Layout.jsx` se for pأ،gina dedicada\n\nPattern jأ، comprovado com Zabbix e Entra ID.\n"},{"id":"api-rest","title":"API REST","icon":"âڑ™ï¸ڈ","content":"# API REST\n\n> Referأھncia completa dos endpoints com exemplos `curl`.\n> **Autor**: Fabricio Cruz\n\n---\n\n## Convenأ§أµes\n\n- **Base URL** local: `http://localhost:3001`\n- **Auth**: header `Authorization: Bearer <JWT>` (exceto rotas pأ؛blicas)\n- **Content-Type**: `application/json` quando hأ، body\n- Em produأ§أ£o, fica atrأ،s do nginx que faz proxy de `/api` â†’ `:3001`\n\n### Como obter um JWT\n\n```bash\nTOKEN=$(curl -s -X POST http://localhost:3001/api/auth/login \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"admin@bagre.local\",\"password\":\"admin123\"}' \\\n  | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"token\"])')\n```\n\nUse `-H \"Authorization: Bearer $TOKEN\"` em todas as chamadas autenticadas.\n\n### Cأ³digos de resposta\n\n| Cأ³digo | Significado |\n|---|---|\n| 200 | OK |\n| 400 | Body/query invأ،lido |\n| 401 | Nأ£o autenticado / token invأ،lido |\n| 403 | Autenticado mas sem permissأ£o (precisa ADMIN) |\n| 404 | Recurso nأ£o encontrado |\n| 409 | Conflito (ex: email duplicado) |\n| 500 | Erro inesperado |\n\n---\n\n## Auth\n\n### POST `/api/auth/login` (pأ؛blico)\n\n```bash\ncurl -X POST $API/api/auth/login \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"admin@bagre.local\",\"password\":\"admin123\"}'\n```\n\nResponse:\n```json\n{\n  \"token\": \"eyJhbGc...\",\n  \"user\": {\n    \"id\": 1, \"email\": \"admin@bagre.local\",\n    \"name\": \"Administrator\", \"role\": \"ADMIN\",\n    \"mustChangePwd\": false\n  }\n}\n```\n\n### GET `/api/auth/me`\n\n```bash\ncurl $API/api/auth/me -H \"Authorization: Bearer $TOKEN\"\n```\n\n### POST `/api/auth/change-password`\n\n```bash\ncurl -X POST $API/api/auth/change-password \\\n  -H \"Authorization: Bearer $TOKEN\" -H 'Content-Type: application/json' \\\n  -d '{\"currentPassword\":\"velha\",\"newPassword\":\"nova123\"}'\n```\n\n### POST `/api/auth/reset-request` (pأ؛blico)\n\nSolicita reset. Sempre retorna 200 (anti-enumeraأ§أ£o).\n\n```bash\ncurl -X POST $API/api/auth/reset-request \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"alguem@empresa\"}'\n```\n\nToken أ© gravado nos logs do servidor.\n\n### POST `/api/auth/reset` (pأ؛blico)\n\nAplica o token gerado:\n\n```bash\ncurl -X POST $API/api/auth/reset \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"token\":\"abc123...\",\"newPassword\":\"nova123\"}'\n```\n\n### GET `/api/auth/sso/start` (pأ؛blico)\n\nInicia fluxo OIDC. Retorna 302 redirect ao Entra ID. Use diretamente no browser, nأ£o via curl.\n\n### GET `/api/auth/sso/callback` (pأ؛blico)\n\nCallback do Entra ID. O navegador أ© redirecionado de volta automaticamente.\n\n---\n\n## Sites\n\n### GET `/api/sites`\n\nLista todos os sites com suas subnets:\n\n```bash\ncurl $API/api/sites -H \"Authorization: Bearer $TOKEN\"\n```\n\n```json\n[\n  {\n    \"id\": 1, \"code\": \"SP3\", \"name\": \"Data Center SP3\",\n    \"subnets\": [\n      {\n        \"id\": 1, \"name\": \"sp3-prod-srv\", \"cidr\": \"10.20.10.0/24\",\n        \"ipCount\": 254, \"usedCount\": 17, ...\n      }\n    ]\n  }, ...\n]\n```\n\n### POST `/api/sites` (ADMIN)\n\n```bash\ncurl -X POST $API/api/sites -H \"Authorization: Bearer $TOKEN\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"code\":\"NEW-DC\",\"name\":\"Novo data center\",\"description\":\"opcional\"}'\n```\n\n### PATCH `/api/sites/:id` (ADMIN)\n\n```bash\ncurl -X PATCH $API/api/sites/2 -H \"Authorization: Bearer $TOKEN\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"name\":\"Renomeado\"}'\n```\n\n### DELETE `/api/sites/:id` (ADMIN)\n\n```bash\ncurl -X DELETE $API/api/sites/2 -H \"Authorization: Bearer $TOKEN\"\n```\n\nCascateia: apaga subnets e IPs vinculados.\n\n---\n\n## Subnets\n\n### GET `/api/subnets/:id`\n\n```bash\ncurl $API/api/subnets/5 -H \"Authorization: Bearer $TOKEN\"\n```\n\n### GET `/api/subnets/:id/ips`\n\nLista IPs da subnet, com filtros opcionais:\n\n```bash\ncurl \"$API/api/subnets/5/ips?status=USED&q=srv\" -H \"Authorization: Bearer $TOKEN\"\n```\n\nQuery params:\n- `status` â€” `FREE | USED | RESERVED | CONFLICT`\n- `q` â€” busca substring em address, hostname, type, function\n\n### POST `/api/subnets` (ADMIN)\n\nCria subnet **e gera todos os IPs automaticamente** se CIDR for fornecido:\n\n```bash\ncurl -X POST $API/api/subnets -H \"Authorization: Bearer $TOKEN\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"siteId\": 1,\n    \"name\": \"LAN-PROD\",\n    \"cidr\": \"10.150.5.0/24\",\n    \"vlanId\": 510\n  }'\n```\n\nResponse inclui `ipsCreated`. Limite: 4096 IPs por subnet.\n\n### PATCH `/api/subnets/:id` (ADMIN)\n\n```bash\ncurl -X PATCH $API/api/subnets/5 -H \"Authorization: Bearer $TOKEN\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"description\":\"Atualizada\"}'\n```\n\nCIDR nأ£o pode mudar.\n\n### DELETE `/api/subnets/:id` (ADMIN)\n\nCascateia: apaga IPs.\n\n---\n\n## IPs\n\n### PATCH `/api/ips/:id` (ADMIN)\n\nEdita campos do IP. Status أ© inferido automaticamente:\n\n```bash\ncurl -X PATCH $API/api/ips/12345 -H \"Authorization: Bearer $TOKEN\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"hostname\":\"srv-novo\",\"type\":\"Servidor\",\"function\":\"Web\"}'\n```\n\nSe vocأھ preencher campos, status vira `USED`. Se enviar todos vazios, vira `FREE`.\n\n### POST `/api/ips/:id/release` (ADMIN)\n\nLibera IP (limpa metadados, status=FREE):\n\n```bash\ncurl -X POST $API/api/ips/12345/release -H \"Authorization: Bearer $TOKEN\"\n```\n\n### POST `/api/ips/:id/reserve` (ADMIN)\n\nMarca como reservado:\n\n```bash\ncurl -X POST $API/api/ips/12345/reserve -H \"Authorization: Bearer $TOKEN\"\n```\n\n---\n\n## Busca\n\n### GET `/api/search?q=`\n\nBusca global em IPs, subnets, sites:\n\n```bash\ncurl \"$API/api/search?q=10.150.0\" -H \"Authorization: Bearer $TOKEN\"\n```\n\n```json\n{\n  \"ips\": [...],\n  \"subnets\": [...],\n  \"sites\": [...]\n}\n```\n\nMأ­nimo 2 caracteres.\n\n---\n\n## Stats\n\n### GET `/api/stats`\n\n```bash\ncurl $API/api/stats -H \"Authorization: Bearer $TOKEN\"\n```\n\n```json\n{\n  \"siteCount\": 9, \"subnetCount\": 41, \"ipCount\": 10414,\n  \"used\": 261, \"reserved\": 0, \"free\": 10153,\n  \"recent\": [...]\n}\n```\n\n### GET `/api/stats/by-site`\n\nEstatأ­sticas por site (para dashboards):\n\n```bash\ncurl $API/api/stats/by-site -H \"Authorization: Bearer $TOKEN\"\n```\n\n---\n\n## Catأ،logos (read-only)\n\n```bash\nGET /api/master-ranges     # ranges mestre da empresa\nGET /api/equinix-vlans     # VLANs \nGET /api/azure-subnets     # subnets das vNets Azure\nGET /api/cidr-reference    # tabela /0 a /32\n```\n\n---\n\n## Firewall\n\n```bash\nGET    /api/firewall-rules\nPOST   /api/firewall-rules           # ADMIN\nPATCH  /api/firewall-rules/:id       # ADMIN\nDELETE /api/firewall-rules/:id       # ADMIN\n```\n\n---\n\n## Usuأ،rios (ADMIN)\n\n```bash\nGET    /api/users\nPOST   /api/users                # cria; se sem password, devolve resetToken\nPATCH  /api/users/:id            # name, role, active\nDELETE /api/users/:id\nPOST   /api/users/:id/reset      # gera novo token de reset\n```\n\nExemplo de criaأ§أ£o com link de reset:\n\n```bash\ncurl -X POST $API/api/users -H \"Authorization: Bearer $TOKEN\" \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"novo@empresa\",\"name\":\"Novo Usuأ،rio\",\"role\":\"READER\"}'\n# {\n#   \"user\": {...},\n#   \"resetToken\": \"abc123...\"\n# }\n# Link a entregar: $WEB/reset?token=abc123...\n```\n\n---\n\n## Auditoria (ADMIN)\n\n### GET `/api/audit`\n\n```bash\ncurl \"$API/api/audit?entity=ip&action=update&take=50\" \\\n  -H \"Authorization: Bearer $TOKEN\"\n```\n\nQuery params:\n- `entity` â€” `ip | site | subnet | user | zabbix_config | oidc_config | firewall_rule`\n- `action` â€” `create | update | delete | sync | login | reset_password | etc`\n- `actor` â€” substring (case-insensitive)\n- `take` â€” mأ،x 500 (padrأ£o 100)\n- `skip` â€” paginaأ§أ£o\n\nCada item tem `before` e `after` em JSON com o estado anterior/novo.\n\n### GET `/api/audit/entities`\n\nLista os valores distintos de `entity` e `action` presentes no log (para popular filtros na UI).\n\n---\n\n## Saأ؛de da rede (ADMIN)\n\n### GET `/api/network-health`\n\n```bash\ncurl $API/api/network-health -H \"Authorization: Bearer $TOKEN\"\n```\n\n```json\n{\n  \"staleAfterDays\": 7,\n  \"stale\": [...IPs marcados USED sem responder hأ، > 7d...],\n  \"conflicts\": [...IPs com status CONFLICT...],\n  \"sources\": [{\"source\":\"zabbix\",\"count\":15}]\n}\n```\n\n---\n\n## Status das integraأ§أµes (ADMIN)\n\n### GET `/api/admin/integrations/status`\n\n```bash\ncurl $API/api/admin/integrations/status -H \"Authorization: Bearer $TOKEN\"\n```\n\nRetorno consolidado: estado de cada integraأ§أ£o (Zabbix, OIDC), eventos recentes, indicador geral.\n\n---\n\n## Configuraأ§أ£o Zabbix (ADMIN)\n\n```bash\nGET   /api/admin/zabbix-config              # lأھ (secrets mascarados)\nPATCH /api/admin/zabbix-config              # atualiza\nPOST  /api/admin/zabbix-config/test         # testa conexأ£o (live)\nPOST  /api/admin/zabbix-config/sync         # forأ§a sincronizaأ§أ£o\n```\n\nExemplo:\n\n```bash\ncurl -X PATCH $API/api/admin/zabbix-config \\\n  -H \"Authorization: Bearer $TOKEN\" -H 'Content-Type: application/json' \\\n  -d '{\"url\":\"https://zabbix.empresa\",\"apiToken\":\"abc\",\"intervalMinutes\":15}'\n\ncurl -X POST $API/api/admin/zabbix-config/test -H \"Authorization: Bearer $TOKEN\"\n# {\"ok\":true,\"message\":\"Conexأ£o e auth OK آ· Zabbix 7.0.26\"}\n\ncurl -X POST $API/api/admin/zabbix-config/sync -H \"Authorization: Bearer $TOKEN\"\n# {\"ok\":true,\"hosts\":17,\"updated\":15,\"ghosts\":[\"172.16.99.99\",\"127.0.0.1\"]}\n```\n\n---\n\n## Configuraأ§أ£o OIDC (ADMIN)\n\n```bash\nGET   /api/admin/oidc-config              # lأھ (secret mascarado)\nPATCH /api/admin/oidc-config              # atualiza\nPOST  /api/admin/oidc-config/test         # discovery do issuer\nGET   /api/config                         # PأڑBLICO â€” informa se SSO estأ، habilitado\n```\n\n---\n\n## Ingestأ£o (token-based)\n\nAuth: `X-Ingest-Token: $INGEST_TOKEN`. Nأ£o usa JWT.\n\n### POST `/api/ingest/discoveries`\n\n```bash\ncurl -X POST $API/api/ingest/discoveries \\\n  -H 'Content-Type: application/json' \\\n  -H \"X-Ingest-Token: $INGEST_TOKEN\" \\\n  -d '{\n    \"discoveries\": [\n      {\n        \"address\": \"10.150.0.50\",\n        \"hostname\": \"srv-novo\",\n        \"type\": \"Servidor\",\n        \"macAddress\": \"AA:BB:CC:DD:EE:FF\",\n        \"osInfo\": \"Ubuntu 22.04\",\n        \"source\": \"nmap-scanner\"\n      }\n    ]\n  }'\n```\n\n```json\n{ \"received\":1, \"updated\":1, \"unmatched\":[], \"errors\":[] }\n```\n\n### POST `/api/ingest/heartbeat`\n\n```bash\ncurl -X POST $API/api/ingest/heartbeat \\\n  -H 'Content-Type: application/json' \\\n  -H \"X-Ingest-Token: $INGEST_TOKEN\" \\\n  -d '{\"address\":\"10.150.0.50\",\"alive\":true,\"source\":\"blackbox\"}'\n```\n\n---\n\n## Importaأ§أ£o\n\n### POST `/api/import/seed`\n\nAuth: `X-Admin-Token: $ADMIN_TOKEN`. Reimporta a planilha (idempotente).\n\n```bash\ncurl -X POST $API/api/import/seed -H \"X-Admin-Token: $ADMIN_TOKEN\"\n```\n\nأڑtil para automaأ§أ£o. Pode ser chamado quando o `seed.json` mudar (ex: pipeline CI que regenera o JSON quando a planilha for atualizada).\n\n---\n\n## Mأ©tricas e healthcheck\n\n### GET `/api/health` (pأ؛blico)\n\n```bash\ncurl $API/api/health\n# {\"ok\":true,\"ts\":\"2026-05-08T...\"}\n```\n\nUse em healthchecks de container/Kubernetes.\n\n### GET `/metrics` (pأ؛blico â€” Prometheus)\n\n```bash\ncurl $API/metrics | head -20\n```\n\n---\n\n## Headers أ؛teis em chamadas de automaأ§أ£o\n\n| Header | Uso |\n|---|---|\n| `Authorization: Bearer <JWT>` | Auth de usuأ،rio |\n| `X-Ingest-Token: <token>` | Auth de scanner/automaأ§أ£o |\n| `X-Admin-Token: <token>` | Auth para reimportaأ§أ£o |\n| `X-Actor: <nome-da-ferramenta>` | Override do actor no audit (opcional, alternativa a JWT) |\n\n---\n\n## Variأ،veis usadas nos exemplos\n\n```bash\nexport API=http://localhost:3001\nexport WEB=http://localhost:3000\nexport INGEST_TOKEN=$(grep INGEST_TOKEN .env | cut -d= -f2)\nexport ADMIN_TOKEN=$(grep ADMIN_TOKEN .env | cut -d= -f2)\nexport TOKEN=$(curl -s -X POST $API/api/auth/login \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"admin@bagre.local\",\"password\":\"admin123\"}' \\\n  | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"token\"])')\n```\n"},{"id":"operacao","title":"Operaأ§أ£o","icon":"ًں©؛","content":"# Operaأ§أ£o\n\n> Backup, restore, troubleshooting, atualizaأ§أ£o, logs.\n> **Autor**: Fabricio Cruz\n\n---\n\n## Logs\n\n### API\n```bash\ndocker compose logs -f api\ndocker compose logs --tail 50 api\ndocker compose logs --since 30m api | grep -i error\n```\n\nA API usa **Pino** (logger estruturado JSON). Para visualizar bonito:\n\n```bash\ndocker compose logs --tail 100 api | docker run -i --rm node:20-alpine npx pino-pretty\n```\n\n### Banco\n```bash\ndocker compose logs db --tail 30\n```\n\n### Frontend (nginx)\n```bash\ndocker compose logs web --tail 50\n# 200 OK e 404 pra rotas SPA sأ£o normais (fallback pro index.html)\n```\n\n---\n\n## Backup do banco\n\n### Backup manual\n\n```bash\n# Dump SQL completo\ndocker compose exec db pg_dump -U bagre -d bagre > backup-$(date +%Y%m%d-%H%M%S).sql\n\n# Compactado\ndocker compose exec db pg_dump -U bagre -d bagre | gzip > backup.sql.gz\n```\n\n### Restore\n\n```bash\n# Atenأ§أ£o: APAGA dados existentes\ndocker compose exec -T db psql -U bagre -d bagre < backup.sql\n\n# De um .gz\ngunzip -c backup.sql.gz | docker compose exec -T db psql -U bagre -d bagre\n```\n\n### Backup automأ،tico (cron)\n\nCrie um cron no host:\n\n```bash\n# crontab -e\n0 2 * * * cd /Users/fabricio/Documents/code/bagre && docker compose exec -T db pg_dump -U bagre bagre | gzip > backups/$(date +\\%Y\\%m\\%d).sql.gz\n```\n\nRecomendado: enviar para S3/Azure Blob a cada backup, manter retenأ§أ£o de 30 dias.\n\n### Backup sأ³ do schema (sem dados)\n\nأڑtil para versionar:\n\n```bash\ndocker compose exec db pg_dump -U bagre -d bagre --schema-only > schema.sql\n```\n\n---\n\n## Atualizaأ§أ£o do sistema\n\n### Pull de nova versأ£o\n\n```bash\ngit pull   # ou mأ©todo equivalente para baixar cأ³digo novo\n\n# Rebuild com cache (rأ،pido)\ndocker compose up -d --build api web\n\n# Migraأ§أµes Prisma rodam automaticamente no boot da API\ndocker compose logs api --tail 30\n```\n\n### Mudanأ§as destrutivas no schema\n\nSe uma atualizaأ§أ£o inclui DROP TABLE ou rename:\n\n1. **Backup antes**: `pg_dump | gzip > pre-upgrade.sql.gz`\n2. Rebuild com `--accept-data-loss` se necessأ،rio (Prisma db push):\n   ```bash\n   docker compose exec api npx prisma db push --accept-data-loss\n   ```\n3. Verifique se o sistema sobe limpo: `curl http://localhost:3001/api/health`\n4. Rollback: pare o sistema, restaure o backup, faأ§a checkout da versأ£o anterior\n\n---\n\n## Monitoramento contأ­nuo\n\n### Healthcheck simples\n\n```bash\n# Em qualquer ferramenta (Pingdom, UptimeRobot, etc)\ncurl -fs http://localhost:3001/api/health || alert\n```\n\n### Mأ©tricas Prometheus\n\n`/metrics` أ© o caminho oficial. Veja [Integraأ§أµes](./05-integracoes.md#mأ©tricas-prometheus) para scrape config e dashboards Grafana sugeridos.\n\n### Auditoria contأ­nua\n\nTela `/admin/audit` mostra os أ؛ltimos 200 eventos por filtro. Para anأ،lise mais profunda:\n\n```bash\n# Top 10 usuأ،rios mais ativos no أ؛ltimo mأھs\ndocker compose exec db psql -U bagre -c \"\n  SELECT actor, count(*) as ops\n  FROM \\\"AuditLog\\\"\n  WHERE \\\"createdAt\\\" > NOW() - INTERVAL '30 days'\n  GROUP BY actor\n  ORDER BY ops DESC LIMIT 10;\n\"\n\n# Operaأ§أµes destrutivas recentes\ndocker compose exec db psql -U bagre -c \"\n  SELECT \\\"createdAt\\\", actor, entity, \\\"entityId\\\"\n  FROM \\\"AuditLog\\\"\n  WHERE action = 'delete'\n  ORDER BY id DESC LIMIT 50;\n\"\n```\n\n---\n\n## Troubleshooting\n\n### Sistema nأ£o responde\n\n```bash\ndocker compose ps\n# Algum contأھiner estأ، com Restarting? Confira o motivo:\ndocker compose logs api --tail 100\n```\n\nCausas comuns:\n- DB nأ£o saudأ،vel â†’ `docker compose logs db`\n- Porta ocupada no host â†’ `lsof -i :3001`\n- Sem memأ³ria â†’ `docker stats`\n\n### Login retorna 401 com credenciais corretas\n\n```bash\n# Verifica usuأ،rio ativo\ndocker compose exec db psql -U bagre -t -c \"\n  SELECT email, role, active, \\\"mustChangePwd\\\" FROM \\\"User\\\";\n\"\n```\n\nReset (se for o admin original):\n\n```bash\ndocker compose exec api node -e \"\nconst bcrypt = require('bcryptjs');\nconst { PrismaClient } = require('@prisma/client');\nconst p = new PrismaClient();\n(async () => {\n  const hash = await bcrypt.hash('admin123', 10);\n  await p.user.update({\n    where: { email: 'admin@bagre.local' },\n    data: { passwordHash: hash, mustChangePwd: false, active: true }\n  });\n  await p.\\$disconnect();\n})();\"\n```\n\n### Sync Zabbix falhou\n\nVerifique no UI: `/admin/integrations` â†’ card Zabbix â†’ mensagem de erro mostrada explicitamente.\n\nSe continuar:\n\n```bash\n# Logs da أ؛ltima sync\ndocker compose exec db psql -U bagre -c \"\n  SELECT \\\"lastSyncAt\\\", \\\"lastSyncStatus\\\", \\\"lastSyncMessage\\\"\n  FROM \\\"ZabbixConfig\\\" WHERE id=1;\n\"\n```\n\nForأ§ar sync via API:\n\n```bash\nTOKEN=$(curl -s -X POST http://localhost:3001/api/auth/login \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"admin@bagre.local\",\"password\":\"admin123\"}' \\\n  | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"token\"])')\ncurl -X POST http://localhost:3001/api/admin/zabbix-config/sync \\\n  -H \"Authorization: Bearer $TOKEN\"\n```\n\n### IPs do Zabbix nأ£o aparecem no IPAM\n\nCausa tأ­pica: os IPs vivos no Zabbix **nأ£o estأ£o em nenhuma subnet cadastrada**. Eles ficam em \"fantasmas\" (`ghosts` na resposta da sync).\n\nPara resolver:\n1. Identifique os ranges no Zabbix: hosts â†’ interfaces\n2. Crie as subnets correspondentes no IPAM\n3. Force a sync â€” agora os IPs vأ£o match\n\n### Frontend mostra tela em branco / erro JS\n\n```bash\n# Hard reload no navegador: Cmd+Shift+R\n# Verifique no DevTools (F12) â†’ Console\n\n# Verifique se o bundle estأ، disponأ­vel\ncurl -sI http://localhost:3000/ | head -5\n```\n\nSe pegou um cache de versأ£o antiga:\n- **Limpe cache do navegador**\n- Ou **rebuild forأ§ado**: `docker compose build --no-cache web && docker compose up -d web`\n\n### \"Body cannot be empty when content-type is set to application/json\"\n\nBug raro do helper de fetch. Jأ، corrigido em versأµes atuais (o helper nأ£o envia Content-Type quando nأ£o hأ، body).\n\nSe aparecer: `Cmd+Shift+R` (hard reload) para pegar o JS novo.\n\n### DB cheio / sem espaأ§o\n\n```bash\ndocker system df    # uso por imagens/contأھineres/volumes\ndocker compose exec db psql -U bagre -c \"\n  SELECT pg_size_pretty(pg_database_size('bagre'));\n\"\n\n# Limpar audit log antigo (cuidado, perde histأ³rico)\ndocker compose exec db psql -U bagre -c \"\n  DELETE FROM \\\"AuditLog\\\" WHERE \\\"createdAt\\\" < NOW() - INTERVAL '180 days';\n\"\n\n# VACUUM full apأ³s delete grande\ndocker compose exec db psql -U bagre -c \"VACUUM FULL;\"\n```\n\n---\n\n## Operaأ§أ£o multi-ambiente\n\n### Dev â†’ Staging â†’ Produأ§أ£o\n\nSugestأ£o de organizaأ§أ£o:\n\n```\nbagre-dev/      .env (DEV_*, JWT_SECRET aleatأ³rio)\nbagre-staging/  .env (creds de staging)\nbagre-prod/     .env (creds reais, secrets em vault)\n```\n\nCada ambiente tem seu prأ³prio `docker compose`. Banco, JWT, e tokens **devem** ser diferentes.\n\n### Promoأ§أ£o de dados (nunca!)\n\n**Nأ£o** copie banco de produأ§أ£o para dev. Para popular dev:\n\n1. Use a planilha original (`data/Controle de IP - LAN.xlsx`)\n2. Sincronize com um Zabbix de teste\n3. Crie usuأ،rios de teste manualmente\n\n### Variأ،veis em produأ§أ£o\n\n```bash\n# Gere secrets robustos\nJWT_SECRET=$(openssl rand -base64 48)\nINGEST_TOKEN=$(openssl rand -hex 24)\nADMIN_TOKEN=$(openssl rand -hex 24)\n\n# E para credenciais sensأ­veis (DB, Zabbix), use um secret manager\n# (Azure Key Vault, AWS Secrets Manager, HashiCorp Vault, sealed-secrets, etc)\n```\n\nNunca commite `.env` real ao git.\n\n---\n\n## Disaster recovery\n\n### Cenأ،rio: DB corrompido\n\n```bash\n# 1. Pare o sistema\ndocker compose down\n\n# 2. Apague o volume corrompido\ndocker volume rm bagre_db_data\n\n# 3. Suba o sistema (DB serأ، recriado e a planilha re-importada se for o primeiro boot)\ndocker compose up -d\n\n# 4. Restaure o backup mais recente\ngunzip -c backups/<latest>.sql.gz | docker compose exec -T db psql -U bagre\n```\n\n### Cenأ،rio: container API quebrado\n\n```bash\ndocker compose stop api\ndocker compose rm -f api\ndocker compose build --no-cache api\ndocker compose up -d api\n```\n\n### Cenأ،rio: usuأ،rio admin perdido\n\nSe vocأھ perdeu acesso a TODAS as contas admin:\n\n```bash\ndocker compose exec api node -e \"\nconst bcrypt = require('bcryptjs');\nconst { PrismaClient } = require('@prisma/client');\nconst p = new PrismaClient();\n(async () => {\n  // Promove o primeiro usuأ،rio a admin com senha temporأ،ria\n  const u = await p.user.findFirst();\n  if (!u) {\n    // Cria do zero\n    await p.user.create({\n      data: {\n        email: 'recovery@bagre.local',\n        name: 'Recovery Admin',\n        passwordHash: await bcrypt.hash('TempReset1234', 10),\n        role: 'ADMIN',\n        active: true,\n        mustChangePwd: true,\n      },\n    });\n    console.log('Created recovery@bagre.local / TempReset1234');\n  } else {\n    await p.user.update({\n      where: { id: u.id },\n      data: {\n        role: 'ADMIN',\n        active: true,\n        passwordHash: await bcrypt.hash('TempReset1234', 10),\n        mustChangePwd: true,\n      },\n    });\n    console.log('Promoted ' + u.email + ' to ADMIN, password reset to TempReset1234');\n  }\n  await p.\\$disconnect();\n})();\"\n```\n\n---\n\n## Performance tuning\n\nPara escalar > 100k IPs ou > 100 usuأ،rios simultأ¢neos:\n\n### Banco\n- Aumente `shared_buffers` (Postgres): variأ،vel `POSTGRES_INITDB_ARGS`\n- Habilite `pg_stat_statements` para detectar queries lentas\n- Replica de leitura (`pgpool` ou Postgres logical replication)\n\n### API\n- Adicione **Redis** para cache de:\n  - Sessions/JWTs revogados\n  - Resultados de busca repetidos\n  - Estado de scheduler\n- Aumente o nأ؛mero de workers do Fastify (cluster mode)\n\n### Frontend\n- nginx: aumente `worker_connections` (default 1024)\n- Habilite gzip e cache agressivo de assets (jأ، habilitado)\n- Use CDN para assets estأ،ticos em produأ§أ£o real\n\n### Mأ©tricas para observar\n- `bagre_process_resident_memory_bytes` (RAM)\n- Tempo de resposta da API (instrumentar Fastify com OTEL)\n- Uso de CPU\n- Latأھncia do DB (`pg_stat_statements`)\n"},{"id":"desenvolvimento","title":"Desenvolvimento","icon":"ًں‘¨â€چًں’»","content":"# Desenvolvimento\n\n> Guia para desenvolvedores: estrutura de cأ³digo, dev local, build, contribuir.\n> **Autor**: Fabricio Cruz\n\n---\n\n## Setup de dev\n\n### Opأ§أ£o A â€” usando os contأھineres (recomendado)\n\nA stack toda roda em Docker, igual produأ§أ£o. Mudanأ§as no cأ³digo requerem rebuild:\n\n```bash\ndocker compose up -d --build api web\n```\n\nPara ver logs em tempo real:\n\n```bash\ndocker compose logs -f api\n```\n\n### Opأ§أ£o B â€” backend local + DB no contأھiner\n\nMais rأ،pido para iteraأ§أ£o:\n\n```bash\n# Sobe sأ³ o DB\ndocker compose up -d db\n\n# API local\ncd apps/api\nnpm install\nDATABASE_URL=postgresql://bagre:bagre@localhost:5433/bagre \\\n  JWT_SECRET=dev-secret \\\n  npx prisma db push\nnpm run dev   # nodemon-like, recarrega em mudanأ§as\n\n# Frontend local (em outro terminal)\ncd apps/web\nnpm install\nnpm run dev   # Vite, HMR a cada save\n```\n\nFrontend dev em `http://localhost:5173` (Vite). O proxy Vite encaminha `/api` para `http://localhost:3001`.\n\n---\n\n## Estrutura do cأ³digo\n\n### Backend (`apps/api/src`)\n\n```\nsrc/\nâ”œâ”€â”€ index.js              # bootstrap Fastify + registra plugins/rotas\nâ”œâ”€â”€ db.js                 # Prisma Client compartilhado (singleton)\nâ”œâ”€â”€ auth.js               # bootstrap admin + guards (requireAuth, requireAdmin)\nâ”œâ”€â”€ audit.js              # logger de auditoria\nâ”œâ”€â”€ cidr.js               # math IPv4 (parseCidr, expandCidr)\nâ”œâ”€â”€ import.js             # importador da planilha â†’ DB\nâ”œâ”€â”€ auth-providers/\nâ”‚   â””â”€â”€ oidc.js           # cliente OIDC (Entra ID)\nâ”œâ”€â”€ integrations/\nâ”‚   â””â”€â”€ zabbix.js         # cliente JSON-RPC + scheduler + sync\nâ””â”€â”€ routes/\n    â”œâ”€â”€ sites.js          # CRUD sites\n    â”œâ”€â”€ subnets.js        # CRUD subnets + auto-gen IPs\n    â”œâ”€â”€ ips.js            # PATCH/release/reserve\n    â”œâ”€â”€ search.js         # /api/search\n    â”œâ”€â”€ catalogs.js       # ranges, vlans, azure subnets\n    â”œâ”€â”€ firewall.js       # CRUD regras firewall\n    â”œâ”€â”€ stats.js          # /api/stats /api/stats/by-site\n    â”œâ”€â”€ ingest.js         # /api/ingest/*\n    â”œâ”€â”€ metrics.js        # /metrics Prometheus\n    â”œâ”€â”€ auth.js           # login, change-password, reset\n    â”œâ”€â”€ users.js          # CRUD usuأ،rios\n    â”œâ”€â”€ audit.js          # GET /api/audit\n    â”œâ”€â”€ oidc.js           # SSO config + start/callback\n    â”œâ”€â”€ zabbix.js         # config + test + sync\n    â”œâ”€â”€ network-health.js # GET /api/network-health\n    â”œâ”€â”€ integrations-status.js # status consolidado\n    â””â”€â”€ import.js         # POST /api/import/seed\n```\n\n### Frontend (`apps/web/src`)\n\n```\nsrc/\nâ”œâ”€â”€ main.jsx              # entrypoint React + providers (Auth, Toast, Query)\nâ”œâ”€â”€ App.jsx               # router + rotas protegidas\nâ”œâ”€â”€ api.js                # cliente fetch + auth helpers\nâ”œâ”€â”€ index.css             # Tailwind base + componentes (.card, .btn, .badge)\nâ”œâ”€â”€ auth/\nâ”‚   â””â”€â”€ AuthContext.jsx   # provider de auth\nâ”œâ”€â”€ components/\nâ”‚   â”œâ”€â”€ Layout.jsx        # sidebar + header + tema\nâ”‚   â”œâ”€â”€ GlobalSearch.jsx  # âŒکK\nâ”‚   â”œâ”€â”€ PageHeader.jsx    # cabeأ§alho consistente\nâ”‚   â”œâ”€â”€ Modal.jsx         # modal genأ©rico\nâ”‚   â”œâ”€â”€ ConfirmDialog.jsx # confirmaأ§أ£o de aأ§أ£o destrutiva\nâ”‚   â”œâ”€â”€ SiteFormModal.jsx\nâ”‚   â”œâ”€â”€ SubnetFormModal.jsx\nâ”‚   â”œâ”€â”€ StatusBadge.jsx\nâ”‚   â””â”€â”€ Toast.jsx         # provider + useToast\nâ””â”€â”€ pages/\n    â”œâ”€â”€ Login.jsx\n    â”œâ”€â”€ Reset.jsx\n    â”œâ”€â”€ Profile.jsx\n    â”œâ”€â”€ SsoCallback.jsx\n    â”œâ”€â”€ Dashboard.jsx\n    â”œâ”€â”€ Sites.jsx\n    â”œâ”€â”€ SubnetDetail.jsx\n    â”œâ”€â”€ Catalogs.jsx\n    â”œâ”€â”€ Firewall.jsx\n    â”œâ”€â”€ CidrCalculator.jsx\n    â”œâ”€â”€ IntegrationDocs.jsx\n    â”œâ”€â”€ Users.jsx               (admin)\n    â”œâ”€â”€ Audit.jsx               (admin)\n    â”œâ”€â”€ NetworkHealth.jsx       (admin)\n    â”œâ”€â”€ IntegrationsStatus.jsx  (admin)\n    â”œâ”€â”€ ZabbixSettings.jsx      (admin)\n    â””â”€â”€ SsoSettings.jsx         (admin)\n```\n\n---\n\n## Adicionar uma nova rota (backend)\n\n1. Crie o arquivo em `apps/api/src/routes/`:\n\n```js\n// apps/api/src/routes/widgets.js\nimport { prisma } from '../db.js';\nimport { auditFromReq } from '../audit.js';\n\nexport async function registerWidgets(app) {\n  app.get('/api/widgets', async () => {\n    return prisma.widget.findMany();\n  });\n\n  app.post('/api/widgets', async (req) => {\n    const created = await prisma.widget.create({ data: req.body });\n    await auditFromReq(req, {\n      entity: 'widget',\n      entityId: created.id,\n      action: 'create',\n      after: created,\n    });\n    return created;\n  });\n}\n```\n\n2. Registre em `index.js`:\n\n```js\nimport { regi
