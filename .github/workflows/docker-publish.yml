name: Docker publish

# Publica imagens em Docker Hub a cada release publicada (tag vX.Y.Z + GitHub Release).
# Secrets necessários no repo (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — username do Docker Hub
#   DOCKERHUB_TOKEN    — access token (Docker Hub → Account Settings → Security → New Access Token)
#
# Imagens publicadas:
#   docker.io/<user>/bagre-api:<version>  + :latest
#   docker.io/<user>/bagre-web:<version>  + :latest

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bagre-api
            context: apps/api
          - image: bagre-web
            context: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            v="${{ github.event.release.tag_name }}"
          else
            v="$(git describe --tags --abbrev=0 2>/dev/null || echo dev)"
          fi
          v="${v#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
